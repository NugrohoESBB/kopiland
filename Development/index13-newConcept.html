<!doctype html>
<html lang="id">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
		<title>Kopi Farm — Pixel Edition</title>
		<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			body {
				background: #1a1008;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				min-height: 100dvh;
				font-family: "Press Start 2P", monospace;
				overflow: hidden;
				width: 100%;
				touch-action: none;
			}
			#wrapper {
				display: flex;
				flex-direction: column;
				align-items: center;
				width: 100%;
			}
			#screen {
				position: relative;
				border: 4px solid #5a3a10;
				border-radius: 3px;
				background: #000;
				box-shadow:
					0 0 0 2px #3a2008,
					0 0 40px rgba(180, 100, 20, 0.3),
					inset 0 0 60px rgba(0, 0, 0, 0.5);
				width: 640px;
				max-width: 100vw;
				box-sizing: border-box;
				overflow: hidden;
			}
			#gc {
				display: block;
				image-rendering: pixelated;
				image-rendering: crisp-edges;
				cursor: pointer;
				width: 640px;
				height: 400px;
				max-width: 100%;
			}
			#hud {
				width: 100%;
				display: flex;
				align-items: stretch;
				background: #100c04;
				border-bottom: 3px solid #3a2408;
				font-size: 8px;
				flex-wrap: nowrap;
				overflow: hidden;
			}
			.hc {
				display: flex;
				align-items: center;
				gap: 3px;
				padding: 4px 5px;
				border-right: 1px solid #2a1808;
				color: #a08040;
				white-space: nowrap;
				font-size: clamp(5px, 1.5vw, 8px);
				flex-shrink: 1;
				min-width: 0;
			}
			.hc .v {
				color: #f0d060;
				font-size: 9px;
			}
			.hc .icon {
				font-size: 14px;
				line-height: 1;
			}
			#hc-weather {
				margin-left: auto;
				border-right: none;
				border-left: 1px solid #2a1808;
				flex-direction: column;
				align-items: flex-end;
				gap: 2px;
				padding: 4px 10px;
			}
			#weather-icon {
				font-size: 18px;
			}
			#weather-txt {
				font-size: 7px;
				color: #907030;
			}
			#season-txt {
				font-size: 6px;
				padding: 2px 5px;
				border-radius: 1px;
			}
			#toolbar {
				width: 100%;
				display: flex;
				background: #0c0804;
				border-top: 3px solid #3a2408;
			}
			.tb {
				flex: 1;
				padding: 8px 2px;
				border: none;
				background: transparent;
				font-family: "Press Start 2P", monospace;
				font-size: 7px;
				color: #5a4020;
				cursor: pointer;
				border-right: 1px solid #1a1008;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 3px;
				transition: all 0.1s;
				line-height: 1;
			}
			.tb:last-child {
				border-right: none;
				flex: 0.5;
			}
			.tb .ti {
				font-size: 16px;
			}
			.tb:hover {
				background: #161008;
				color: #c0a040;
			}
			.tb.on {
				background: #181208;
				color: #f0d060;
				box-shadow: inset 0 -3px 0 #e09020;
			}
			.tb.on .ti {
				filter: drop-shadow(0 0 4px #f0a020);
			}
			#statusbar {
				width: 100%;
				background: #0a0804;
				border-top: 2px solid #2a1808;
				padding: 4px 10px;
				display: flex;
				align-items: center;
				gap: 8px;
				font-size: 7px;
				color: #4a3818;
			}
			#plot-txt {
				color: #a09050;
				flex: 1;
			}
			#day-wrap {
				display: flex;
				align-items: center;
				gap: 6px;
				margin-left: auto;
			}
			#daybar {
				width: 80px;
				height: 5px;
				background: #1a1408;
				border-radius: 2px;
				overflow: hidden;
			}
			#dayfill {
				height: 100%;
				background: linear-gradient(90deg, #e06010, #f0d060);
				border-radius: 2px;
				transition: width 0.3s;
			}
			#daytime-txt {
				font-size: 7px;
				color: #706030;
				min-width: 40px;
				text-align: right;
			}
			#nextday-btn {
				font-size: 7px;
				background: #151008;
				border: 1px solid #2a1808;
				color: #6a5020;
				padding: 3px 7px;
				cursor: pointer;
				border-radius: 1px;
				font-family: "Press Start 2P", monospace;
			}
			#nextday-btn:hover {
				color: #c0a040;
				border-color: #5a4020;
			}
			#side {
				position: absolute;
				right: -220px;
				top: 0;
				width: 216px;
				height: 100%;
				background: #0e0a04;
				border-left: 3px solid #3a2408;
				display: flex;
				flex-direction: column;
				font-size: 7px;
				transition: right 0.2s;
				z-index: 8;
			}
			#side.open {
				right: 0;
			}
			#panel-tabs {
				display: flex;
				border-bottom: 2px solid #2a1808;
			}
			.ptab {
				flex: 1;
				padding: 7px 2px;
				text-align: center;
				font-size: 6px;
				cursor: pointer;
				color: #3a2810;
				border-bottom: 2px solid transparent;
			}
			.ptab.on {
				color: #f0d060;
				border-bottom-color: #e09020;
				background: #13100a;
			}
			.ptab:hover {
				color: #a08030;
			}
			#panel-body {
				flex: 1;
				overflow-y: auto;
				padding: 6px;
				scrollbar-width: thin;
				scrollbar-color: #3a2408 #0e0a04;
			}
			.sc {
				border: 1px solid #2a1808;
				border-radius: 1px;
				padding: 7px;
				margin-bottom: 7px;
				cursor: pointer;
				background: #12100a;
				transition: all 0.1s;
			}
			.sc:hover {
				border-color: #6a4820;
			}
			.sc.sel {
				border-color: #f0a020;
				background: #1a1408;
			}
			.sc-name {
				font-size: 8px;
				color: #e0c050;
				margin-bottom: 3px;
			}
			.sc-desc {
				font-size: 6px;
				color: #5a4820;
				line-height: 1.6;
				margin-bottom: 4px;
			}
			.sc-row {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-top: 5px;
			}
			.sc-price {
				font-size: 7px;
				color: #60d060;
			}
			.buy-btn {
				font-size: 6px;
				background: #102a08;
				border: 1px solid #308018;
				color: #70d030;
				padding: 3px 7px;
				cursor: pointer;
				border-radius: 1px;
				font-family: "Press Start 2P", monospace;
			}
			.buy-btn:hover {
				background: #1a3a10;
			}
			.statbar {
				height: 4px;
				background: #1a1408;
				border-radius: 1px;
				margin-top: 2px;
				overflow: hidden;
			}
			.statfill {
				height: 100%;
				border-radius: 1px;
			}
			.nc {
				border: 1px solid #2a1808;
				border-radius: 1px;
				padding: 7px;
				margin-bottom: 8px;
				background: #12100a;
			}
			.nc-head {
				display: flex;
				align-items: center;
				gap: 6px;
				margin-bottom: 4px;
			}
			.nc-av {
				font-size: 18px;
				line-height: 1;
			}
			.nc-name {
				font-size: 8px;
				color: #d0b040;
			}
			.nc-role {
				font-size: 6px;
				color: #5a4820;
				margin-top: 2px;
			}
			.nc-desc {
				font-size: 6px;
				color: #4a3818;
				line-height: 1.6;
				margin-bottom: 5px;
			}
			.nc-row {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 3px 0;
				border-top: 1px solid #1a1008;
			}
			.nc-cn {
				font-size: 6px;
				color: #b09040;
			}
			.nc-pr {
				font-size: 7px;
				color: #60d060;
			}
			.sell-btn {
				font-size: 6px;
				background: #0a2008;
				border: 1px solid #206010;
				color: #60c030;
				padding: 2px 6px;
				cursor: pointer;
				border-radius: 1px;
				font-family: "Press Start 2P", monospace;
			}
			.sell-btn:hover {
				background: #142808;
			}
			.sell-btn:disabled {
				opacity: 0.35;
				cursor: not-allowed;
			}
			.ir {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 5px 0;
				border-bottom: 1px solid #1a1008;
				font-size: 7px;
			}
			.ir-name {
				color: #c0a040;
			}
			.ir-qty {
				font-size: 9px;
				color: #f0d060;
			}
			#toast {
				position: absolute;
				top: 44px;
				left: 50%;
				transform: translateX(-50%);
				background: #0e0a02ee;
				border: 2px solid #7a5818;
				color: #f0d060;
				padding: 5px 14px;
				border-radius: 2px;
				font-size: 7px;
				white-space: nowrap;
				pointer-events: none;
				opacity: 0;
				transition: opacity 0.2s;
				z-index: 20;
				max-width: 90%;
				text-align: center;
			}
			#toast.show {
				opacity: 1;
			}
			#panel-toggle {
				position: absolute;
				right: 0;
				top: 50%;
				transform: translateY(-50%);
				background: #0e0a04;
				border: 2px solid #3a2408;
				border-right: none;
				padding: 8px 4px;
				cursor: pointer;
				font-size: 8px;
				color: #6a5020;
				border-radius: 2px 0 0 2px;
				z-index: 15;
				writing-mode: vertical-rl;
			}
			#panel-toggle:hover {
				color: #c0a040;
			}
			#panel-toggle.shifted {
				right: 216px;
				transition: right 0.2s;
			}
			#panel-toggle {
				transition: right 0.2s;
			}
			#intro {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: #000;
				z-index: 30;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 12px;
				overflow-y: auto;
				padding: 12px;
				box-sizing: border-box;
			}
			#intro-canvas {
				image-rendering: pixelated;
				border: 2px solid #3a2408;
				width: min(320px, 85vw);
				height: auto;
			}
			.intro-title {
				font-size: clamp(8px, 3.5vw, 14px);
				color: #f0d060;
				text-shadow:
					0 0 20px #e08010,
					2px 2px #6a3000;
				text-align: center;
				line-height: 2;
			}
			.intro-sub {
				font-size: clamp(5px, 2vw, 7px);
				color: #7a5820;
				text-align: center;
				line-height: 2;
			}
			#start-btn {
				font-size: 8px;
				background: #102808;
				color: #70e030;
				border: 2px solid #40a018;
				padding: 12px 24px;
				cursor: pointer;
				font-family: "Press Start 2P", monospace;
				border-radius: 2px;
				animation: blink 1s step-end infinite;
			}
			#minimap {
				position: absolute;
				bottom: 36px;
				right: 6px; /* ← ganti dari left:6px ke right:6px */
				width: 90px;
				height: 30px;
				background: rgba(0, 0, 0, 0.6);
				border: 1px solid #3a2408;
				border-radius: 2px;
			}
			@keyframes blink {
				0%,
				100% {
					opacity: 1;
				}
				50% {
					opacity: 0.3;
				}
			}

			/* ════ MOBILE CONTROLS ════ */
			#mobile-controls {
				display: none;
				position: absolute;
				bottom: 36px;
				left: 0;
				right: 0;
				height: 140px;
				pointer-events: none;
				z-index: 10;
			}
			@media (max-width: 900px), (pointer: coarse) {
				#mobile-controls {
					display: block;
				}
				#toolbar {
					display: none;
				}
				#screen {
					width: 100vw;
					max-width: 100vw;
				}
				#gc {
					width: 100vw;
					height: auto;
					max-width: 100vw;
				}
			}
			@media (max-width: 768px), (pointer: coarse) {
				#mobile-controls {
					display: block;
				}
				#nextday-btn {
					padding: 5px 10px;
				}
			}

			/* Joystick */
			#joystick-zone {
				position: absolute;
				left: 12px;
				bottom: 8px;
				width: 120px;
				height: 120px;
				pointer-events: all;
			}
			#joystick-base {
				position: absolute;
				left: 10px;
				top: 10px;
				width: 100px;
				height: 100px;
				background: rgba(255, 255, 255, 0.08);
				border: 3px solid rgba(255, 200, 80, 0.35);
				border-radius: 50%;
			}
			#joystick-thumb {
				position: absolute;
				left: 30px;
				top: 30px;
				width: 40px;
				height: 40px;
				background: radial-gradient(circle at 35% 35%, rgba(255, 220, 100, 0.9), rgba(180, 120, 20, 0.85));
				border: 2px solid rgba(255, 200, 80, 0.7);
				border-radius: 50%;
				box-shadow: 0 0 12px rgba(255, 180, 20, 0.4);
				transition:
					left 0.05s,
					top 0.05s;
			}

			/* Action Buttons */
			#action-btns {
				position: absolute;
				right: 14px;
				bottom: 8px;
				width: 150px;
				height: 120px;
				pointer-events: all;
				transition: opacity 0.2s;
			}
			.act-btn {
				position: absolute;
				width: 48px;
				height: 48px;
				border-radius: 50%;
				border: none;
				font-family: "Press Start 2P", monospace;
				font-size: 7px;
				cursor: pointer;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 2px;
				line-height: 1.3;
				box-shadow:
					0 4px 0 rgba(0, 0, 0, 0.5),
					0 0 10px rgba(0, 0, 0, 0.3);
				-webkit-tap-highlight-color: transparent;
				transition:
					transform 0.08s,
					box-shadow 0.08s;
				pointer-events: all;
			}
			.act-btn:active {
				transform: scale(0.9) translateY(2px);
				box-shadow: 0 1px 0 rgba(0, 0, 0, 0.5);
			}
			.act-btn .bi {
				font-size: 16px;
				line-height: 1;
			}

			/* Posisi tiap tombol (layout diamond) */
			#btn-act-dig {
				bottom: 60px;
				left: 0px;
				background: radial-gradient(circle at 35% 30%, #7a5a28, #4a3010);
				color: #f0d060;
				border: 2px solid #c0901030;
			}
			#btn-act-sow {
				bottom: 60px;
				right: 0px;
				background: radial-gradient(circle at 35% 30%, #286030, #103a18);
				color: #80e040;
				border: 2px solid #40c02030;
			}
			#btn-act-water {
				bottom: 110px;
				left: 50px;
				background: radial-gradient(circle at 35% 30%, #204878, #102840);
				color: #60c0ff;
				border: 2px solid #4090d030;
			}
			#btn-act-harvest {
				bottom: 8px;
				left: 50px;
				background: radial-gradient(circle at 35% 30%, #784020, #401808);
				color: #ffb040;
				border: 2px solid #e0802030;
			}
			#btn-act-action {
				bottom: 60px;
				left: 50px;
				width: 54px;
				height: 54px;
				background: radial-gradient(circle at 35% 30%, #782020, #400808);
				color: #ff8080;
				border: 3px solid #e0404060;
				font-size: 6px;
				box-shadow:
					0 4px 0 rgba(0, 0, 0, 0.5),
					0 0 16px rgba(220, 60, 60, 0.3);
			}
			#btn-act-action .bi {
				font-size: 18px;
			}

			/* ════ FULLSCREEN BUTTON ════ */
			#fullscreen-bar {
				width: 100%;
				display: flex;
				justify-content: flex-end;
				align-items: center;
				background: #0a0804;
				border-bottom: 2px solid #2a1808;
				padding: 4px 8px;
				gap: 8px;
			}
			#fs-btn {
				font-family: "Press Start 2P", monospace;
				font-size: 7px;
				background: #151008;
				border: 1px solid #3a2808;
				color: #7a5820;
				padding: 4px 10px;
				cursor: pointer;
				border-radius: 2px;
				display: flex;
				align-items: center;
				gap: 5px;
				transition: all 0.1s;
			}
			#fs-btn:hover {
				color: #f0d060;
				border-color: #7a5820;
				background: #1a1208;
			}
			#fs-title {
				font-family: "Press Start 2P", monospace;
				font-size: 7px;
				color: #3a2810;
				flex: 1;
				text-align: left;
				padding-left: 4px;
			}

			/* Fullscreen mode */
			#screen:-webkit-full-screen {
				width: 100vw !important;
				height: 100vh !important;
				border: none !important;
			}
			#screen:-moz-full-screen {
				width: 100vw !important;
				height: 100vh !important;
				border: none !important;
			}
			#screen:fullscreen {
				width: 100vw !important;
				height: 100vh !important;
				border: none !important;
			}

			/* Landscape lock hint */
			#rotate-hint {
				display: none;
				position: fixed;
				inset: 0;
				background: #000;
				z-index: 9999;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 16px;
				font-family: "Press Start 2P", monospace;
				font-size: 10px;
				color: #f0d060;
				text-align: center;
				padding: 20px;
			}
			#rotate-hint .rh-icon {
				font-size: 48px;
				animation: spin90 1.2s ease-in-out infinite alternate;
			}
			@keyframes spin90 {
				from {
					transform: rotate(0deg);
				}
				to {
					transform: rotate(90deg);
				}
			}
			@media (max-width: 900px) and (orientation: portrait) {
				#rotate-hint {
					display: flex;
				}
			}
		</style>
	</head>
	<body>
		<div id="wrapper">
			<div id="screen" style="position: relative">
				<!-- FULLSCREEN BAR -->
				<div id="fullscreen-bar">
					<span id="fs-title">KOPI FARM</span>
					<button id="fs-btn" onclick="toggleFullscreen()">
						<span id="fs-icon">⛶</span>
						<span id="fs-label">FULLSCREEN</span>
					</button>
				</div>

				<!-- INTRO -->
				<div id="intro">
					<canvas id="intro-canvas" width="320" height="240"></canvas>
					<div class="intro-title">KOPI FARM</div>
					<div class="intro-sub">Pixel Edition · Scrolling World<br />Tanam · Rawat · Panen · Jual ke NPC</div>
					<button id="start-btn" onclick="startGame()">▶ MULAI BERTANI</button>
				</div>
				<!-- HUD -->
				<div id="hud">
					<div class="hc"><span class="icon">💰</span><span class="v" id="h-gold">500</span><span>rp</span></div>
					<div class="hc"><span class="icon" id="h-seed-icon">🌱</span><span class="v" id="h-seed-qty">5</span></div>
					<div class="hc"><span class="icon">☕</span><span class="v" id="h-inv">0</span></div>
					<div class="hc"><span class="icon">📅</span>Hari <span class="v" id="h-day">1</span></div>
					<div class="hc"><span class="icon">🗺</span><span class="v" id="h-zone">Ladang</span></div>
					<div class="hc" id="hc-weather">
						<div id="weather-icon">🌤</div>
						<div id="weather-txt">Cerah</div>
						<div id="season-txt">Hujan</div>
					</div>
				</div>
				<!-- GAME CANVAS -->

			function spawnParticles(cx, cy, type) {
				const configs = {
					dirt: { count: 14, colors: ["#8b5a30", "#6b3a18", "#c08040", "#a06020", "#d0a060"], vx: [-2.5, 2.5], vy: [-4, -0.5], size: [2, 5], life: [20, 35], gravity: 0.25 },

					seed: { count: 8, colors: ["#c8a040", "#e0c060", "#a08020"], vx: [-1.5, 1.5], vy: [-3, -0.5], size: [2, 3], life: [15, 25], gravity: 0.2 },
					sparkle: { count: 12, colors: ["#f0e060", "#ffd700", "#fff080", "#ffb020"], vx: [-2, 2], vy: [-4, -1], size: [2, 4], life: [20, 30], gravity: 0.15 },
					leaf: { count: 10, colors: ["#60a820", "#80c030", "#40801a", "#a0d050"], vx: [-2, 2], vy: [-3, -0.5], size: [2, 4], life: [25, 40], gravity: 0.1 },
					coin: { count: 10, colors: ["#f0d060", "#e0b040", "#ffd700"], vx: [-2, 2], vy: [-5, -1], size: [3, 5], life: [22, 32], gravity: 0.28 },
				};
				const c = configs[type];
				if (!c) return;
				for (let i = 0; i < c.count; i++) {
					particles.push({
						x: cx + (Math.random() - 0.5) * 10,
						y: cy + (Math.random() - 0.5) * 6,
						vx: c.vx[0] + Math.random() * (c.vx[1] - c.vx[0]),
						vy: c.vy[0] + Math.random() * (c.vy[1] - c.vy[0]),
						size: c.size[0] + Math.random() * (c.size[1] - c.size[0]),
						life: c.life[0] + Math.random() * (c.life[1] - c.life[0]),
						maxLife: 0,
						gravity: c.gravity,
						color: c.colors[Math.floor(Math.random() * c.colors.length)],
						alpha: 1,
					});
					particles[particles.length - 1].maxLife = particles[particles.length - 1].life;
				}
			}
			function updateParticles() {
				particles = particles.filter((p) => {
					p.x += p.vx;
					p.y += p.vy;
					p.vy += p.gravity;
					p.vx *= 0.96;
					p.life--;
					p.alpha = p.life / p.maxLife;
					return p.life > 0;
				});
			}
			function drawParticles() {
				particles.forEach((p) => {
					ctx.save();
					ctx.globalAlpha = p.alpha;
					ctx.fillStyle = p.color;
					const sz = Math.max(1, Math.floor(p.size * p.alpha));
					ctx.fillRect(Math.round(p.x), Math.round(p.y), sz, sz);
					ctx.restore();
				});
			}

			// ════════ TILE DRAWING ════════
			function drawTile(screenC, r, worldC) {
				const x = screenC * TILE,
					y = r * TILE;
				const p = plots[r]?.[worldC];

				// Determine zone
				if (worldC >= MARKET_START) {
					// Market zone — cobblestone
					const even = (screenC + r) % 2 === 0;
					ctx.fillStyle = even ? "#a09070" : "#8a7a60";
					ctx.fillRect(x, y, TILE, TILE);
					// Cobble lines
					ctx.strokeStyle = "rgba(0,0,0,0.15)";
					ctx.lineWidth = 1;
					ctx.strokeRect(x + 2, y + 2, TILE - 4, TILE - 4);
					// Market zone border line
					if (worldC === MARKET_START) {
						ctx.fillStyle = "#c0a050";
						ctx.fillRect(x, y, 3, TILE);
					}
				} else if (worldC >= ROAD_START) {
					// Road/path zone — dirt path
					const even = (screenC + r) % 3 === 0;
					ctx.fillStyle = even ? "#c0a060" : "#a8905a";
					ctx.fillRect(x, y, TILE, TILE);
					// Path texture
					ctx.fillStyle = "rgba(0,0,0,0.06)";
					for (let i = 0; i < 2; i++) ctx.fillRect(x + 8 + i * 20, y + 12, 8, 3);
					// Road border
					if (worldC === ROAD_START) {
						ctx.fillStyle = "#7a5a20";
						ctx.fillRect(x + TILE - 3, y, 3, TILE);
					}
					if (worldC === ROAD_END - 1) {
						ctx.fillStyle = "#c0a050";
						ctx.fillRect(x + TILE - 3, y, 3, TILE);
					}
					// Road sign at entry
					if (worldC === ROAD_START && r === 4) {
						ctx.fillStyle = "#8b5a20";
						ctx.fillRect(x + 16, y + 2, 4, 30);
						ctx.fillStyle = "#e0c060";
						ctx.fillRect(x + 6, y + 2, 24, 14);
						ctx.fillStyle = "#3a2010";
						ctx.font = "5px 'Press Start 2P',monospace";
						ctx.textAlign = "center";
						ctx.fillText("PASAR", x + 18, y + 12);
					}
				} else {
					// Farm zone
					if (!p || p.state === PS.EMPTY) {
						const even = (screenC + r) % 2 === 0;
						ctx.fillStyle = even ? "#3a6a1a" : "#2d5512";
						ctx.fillRect(x, y, TILE, TILE);
						ctx.fillStyle = "rgba(80,160,30,0.35)";
						ctx.fillRect(x + 3, y + 4, 2, 4);
						ctx.fillRect(x + 3, y + 3, 4, 2);
						ctx.fillRect(x + 12, y + 8, 2, 5);
						ctx.fillRect(x + 12, y + 7, 4, 2);
						ctx.fillRect(x + 26, y + 5, 2, 4);
						ctx.fillRect(x + 26, y + 4, 4, 2);
					} else {
						ctx.fillStyle = p.state === PS.DUG ? "#3d2010" : "#5a3818";
						ctx.fillRect(x, y, TILE, TILE);
						ctx.fillStyle = "rgba(0,0,0,0.12)";
						for (let i = 0; i < 3; i++) for (let j = 0; j < 2; j++) ctx.fillRect(x + 4 + i * 13, y + 5 + j * 16, 9, 5);
						if (p.coffeeType) {
							ctx.fillStyle = COFFEE[p.coffeeType].color + "33";
							ctx.fillRect(x + 1, y + 1, TILE - 2, 5);
						}
					}
					// Player highlight
					if (worldC === player.x && r === player.y) {
						ctx.strokeStyle = "rgba(255,235,80,0.8)";
						ctx.lineWidth = 2;
						ctx.strokeRect(x + 1, y + 1, TILE - 2, TILE - 2);
						ctx.fillStyle = "rgba(255,235,80,0.06)";
						ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
					}
					if (p) drawPlant(p, x + TILE / 2, y + TILE / 2, Date.now());
				}
				// Grid
				ctx.strokeStyle = "rgba(0,0,0,0.1)";
				ctx.lineWidth = 1;
				ctx.strokeRect(x, y, TILE, TILE);
			}

			function drawPlant(p, cx, cy, now) {

					ctx.fillRect(cx - 14, cy - 8, 28, 16);

					ctx.fillRect(cx - 8, cy - 16, 16, 4);
					ctx.fillRect(cx - 6, cy - 18, 12, 4);

						[-8, -6],

			// ════════ NPC SPRITE RENDERER ════════
			const NPC_SCALE = 2;
			function drawNPCSprite(screenX, screenY, npcId, frameIdx, flipX) {
				const sp = NPC_SPRITES[npcId];
				if (!sp) return;
				const frame = sp.frames[frameIdx % sp.frames.length];
				const SC = NPC_SCALE;
				const rows = frame;
				const W = rows[0].length,
					H = rows.length;
				const ox = screenX - Math.floor((W * SC) / 2);
				const oy = screenY - Math.floor((H * SC) / 2);
				ctx.save();
				if (flipX) {
					ctx.scale(-1, 1);
					ctx.translate(-screenX * 2, 0);
				}
				for (let r = 0; r < H; r++) {
					for (let c = 0; c < W; c++) {
						const ch = rows[r][c];
						if (ch === "." || ch === " ") continue;
						const col = PAL[ch];
						if (!col) continue;
						ctx.fillStyle = col;
						ctx.fillRect(ox + c * SC, oy + r * SC, SC, SC);
					}
				}
				ctx.restore();
			}

			// ════════ NPC HOUSES + WORLD OBJECTS ════════
			function drawNPCHouse(npc, screenX, screenY) {
				const tx = screenX,
					ty = screenY;
				const hw = TILE * 3,
					hh = TILE * 3;

				// House shadow
				ctx.fillStyle = "rgba(0,0,0,0.25)";
				ctx.fillRect(tx + 4, ty + hh - 4, hw, 8);

				// House walls
				ctx.fillStyle = npc.houseColor;
				ctx.fillRect(tx, ty + TILE * 0.8, hw, hh - TILE * 0.8);

				// Roof (triangle via polygon)
				ctx.fillStyle = npc.roofColor;
				ctx.beginPath();
				ctx.moveTo(tx - 6, ty + TILE * 0.8);
				ctx.lineTo(tx + hw / 2, ty - TILE * 0.3);
				ctx.lineTo(tx + hw + 6, ty + TILE * 0.8);
				ctx.closePath();
				ctx.fill();
				// Roof ridge
				ctx.fillStyle = "rgba(0,0,0,0.2)";
				ctx.fillRect(tx + hw / 2 - 3, ty - TILE * 0.3, 6, TILE * 1.1);

				// Door
				ctx.fillStyle = "rgba(0,0,0,0.5)";
				ctx.fillRect(tx + hw / 2 - 10, ty + hh - TILE * 1.0, 20, TILE * 1.0);
				// Door frame
				ctx.strokeStyle = "rgba(255,200,100,0.5)";
				ctx.lineWidth = 1.5;
				ctx.strokeRect(tx + hw / 2 - 10, ty + hh - TILE * 1.0, 20, TILE * 1.0);
				// Door knob
				ctx.fillStyle = "#c8a040";
				ctx.fillRect(tx + hw / 2 + 5, ty + hh - TILE * 0.5, 3, 3);

				// Windows
				const winY = ty + TILE * 1.1;
				[tx + TILE * 0.2, tx + TILE * 1.9].forEach((wx) => {
					ctx.fillStyle = "rgba(255,240,150,0.6)";
					ctx.fillRect(wx, winY, TILE * 0.6, TILE * 0.6);
					ctx.strokeStyle = "rgba(0,0,0,0.4)";
					ctx.lineWidth = 1;
					ctx.strokeRect(wx, winY, TILE * 0.6, TILE * 0.6);
					// Window cross
					ctx.fillStyle = "rgba(0,0,0,0.25)";
					ctx.fillRect(wx + TILE * 0.28, winY, 2, TILE * 0.6);
					ctx.fillRect(wx, winY + TILE * 0.28, TILE * 0.6, 2);
				});

				// Sign board
				ctx.fillStyle = "#c8a040";
				ctx.fillRect(tx + TILE * 0.6, ty + TILE * 0.82, TILE * 1.8, TILE * 0.45);
				ctx.strokeStyle = "#8a6010";
				ctx.lineWidth = 1;

			// Draw chat bubble above NPC
			function drawChatBubble(screenX, screenY, npc) {
				const pulse = 0.75 + 0.25 * Math.sin(Date.now() / 280);
				const bw = 56,
					bh = 22;
				const bx = screenX - bw / 2,
					by = screenY - bh - 8;

				ctx.save();
				ctx.globalAlpha = pulse;
				// Bubble shadow
				ctx.fillStyle = "rgba(0,0,0,0.3)";
				ctx.beginPath();
				ctx.roundRect(bx + 2, by + 2, bw, bh, 5);
				ctx.fill();

				ctx.fillStyle = "#fffbe8";
				ctx.strokeStyle = "#e0a020";
				ctx.lineWidth = 2;
				ctx.beginPath();
				ctx.roundRect(bx, by, bw, bh, 5);
				ctx.fill();
				ctx.stroke();
				// Tail
				ctx.fillStyle = "#fffbe8";
				ctx.strokeStyle = "#e0a020";
				ctx.lineWidth = 2;
				ctx.beginPath();
				ctx.moveTo(screenX - 5, by + bh);
				ctx.lineTo(screenX, by + bh + 7);
				ctx.lineTo(screenX + 5, by + bh);
				ctx.fill();
				ctx.stroke();
				// Text
				ctx.fillStyle = "#8a5010";
				ctx.font = "5px 'Press Start 2P',monospace";
				ctx.textAlign = "center";

			// ════════ DRAW ALL NPCs (houses + sprites + bubbles) ════════
			function drawMarketArea() {
				const now = Date.now();

				for (const npc of NPC_TEMPLATES) {
					const screenC = npc.worldX - camX;
					if (screenC < -3 || screenC > VIEW_COLS + 1) continue; // off screen

					const screenX = screenC * TILE + TILE; // center of house
					const screenY = npc.worldY * TILE;

					// Draw house
					drawNPCHouse(npc, screenC * TILE, screenY);

					// NPC stands in front of house (1 tile below house base)
					const npcScreenX = screenC * TILE + TILE; // center
					const npcScreenY = screenY + TILE * 3 + TILE * 0.5; // in front of door

					// Animate NPC idle (bob)
					const ns = npcState[npc.id];
					ns.frameTimer += 16;
					if (ns.frameTimer > 500) {
						ns.frameTimer = 0;
						ns.frame = (ns.frame + 1) % 2;
					}

					// Shadow
					ctx.save();
					ctx.globalAlpha = 0.2;
					ctx.fillStyle = "#000";
					ctx.beginPath();
					ctx.ellipse(npcScreenX, npcScreenY + 14, 10, 3, 0, 0, Math.PI * 2);
					ctx.fill();
					ctx.restore();

					// Draw NPC sprite
					drawNPCSprite(npcScreenX, npcScreenY, npc.id, ns.frame, false);

					// NPC role label below sprite
					ctx.save();
					ctx.font = "5px 'Press Start 2P',monospace";
					ctx.textAlign = "center";
					ctx.strokeStyle = "rgba(0,0,0,0.8)";
					ctx.lineWidth = 3;
					ctx.strokeText(npc.role, npcScreenX, npcScreenY + 22);
					ctx.fillStyle = "#f0d080";
					ctx.fillText(npc.role, npcScreenX, npcScreenY + 22);
					ctx.restore();

					// Check proximity to player — show chat bubble
					const distX = Math.abs(player.x - npc.worldX);
					const distY = Math.abs(player.y - (npc.worldY + 3));
					if (distX <= 3 && distY <= 2) {
						drawChatBubble(npcScreenX, npcScreenY - 18, npc);
					}
				}

				// ── Decorative NPCs (pengunjung & pedagang) ──
				for (const dn of DECO_NPCS) {
					const sc = dn.worldX - camX;
					if (sc < -1 || sc > VIEW_COLS + 1) continue;
					const dnX = sc * TILE + TILE / 2;
					const dnY = dn.worldY * TILE + TILE / 2;

					// Animasi bob
					const dns = decoNpcState[dn.id];
					dns.frameTimer += 16;
					if (dns.frameTimer > 600 + (dn.bobOffset % 200)) {
						dns.frameTimer = 0;
						dns.frame = (dns.frame + 1) % 2;
					}

					// Shadow
					ctx.save();
					ctx.globalAlpha = 0.18;
					ctx.fillStyle = "#000";
					ctx.beginPath();
					ctx.ellipse(dnX, dnY + 14, 9, 3, 0, 0, Math.PI * 2);
					ctx.fill();
					ctx.restore();

					// Sprite
					drawNPCSprite(dnX, dnY, dn.sprite, dns.frame, dn.bobOffset % 2 === 0);

					// Label
					ctx.save();
					ctx.font = "4px 'Press Start 2P',monospace";
					ctx.textAlign = "center";
					ctx.strokeStyle = "rgba(0,0,0,0.8)";
					ctx.lineWidth = 3;
					ctx.strokeText(dn.label, dnX, dnY + 22);
					ctx.fillStyle = "#d0c080";
					ctx.fillText(dn.label, dnX, dnY + 22);
					ctx.restore();
				}
			}

			// ════════ CHARACTER RENDERER ════════
			const SPRITE_SCALE = 2;
			function drawCharacter() {
				const a = ANIMS[player.anim];
				if (!a) return;
				const frame = a.frames[Math.min(player.frame, a.frames.length - 1)];
				if (!frame) return;
				const screenC = player.x - camX;
				const px = screenC * TILE + TILE / 2;
				const py = player.y * TILE + TILE / 2;
				// Shadow
				ctx.save();
				ctx.globalAlpha = 0.25;
				ctx.fillStyle = "#000";
				ctx.beginPath();
				ctx.ellipse(px, py + 14, 12, 4, 0, 0, Math.PI * 2);
				ctx.fill();
				ctx.restore();
				const now = Date.now();
				const bob = player.moving && !player.isActing ? Math.sin(now / 100) * 1.5 : 0;
				ctx.save();
				if (player.anim === "walk_left") {
					ctx.scale(-1, 1);
					ctx.translate(-px * 2, 0);
				}
				const SC = SPRITE_SCALE;
				const rows = frame;
				const W = rows[0].length,
					H = rows.length;
				const ox = px - Math.floor((W * SC) / 2),
					oy = py - Math.floor((H * SC) / 2) + Math.round(bob);
				for (let r = 0; r < H; r++)
					for (let c = 0; c < W; c++) {
						const ch = rows[r][c];
						if (ch === "." || ch === " ") continue;
						const col = PAL[ch];
						if (!col) continue;
						ctx.fillStyle = col;
						ctx.fillRect(ox + c * SC, oy + r * SC, SC, SC);
					}
				ctx.restore();
			}

			// ════════ MINIMAP ════════
			function drawMinimap() {
				const mm = document.getElementById("minimap");
				const mc = mm.getContext("2d");
				const mw = 90,
					mh = 30;
				mm.width = mw;
				mm.height = mh;

			// ════════ WEATHER & SEASON ════════
			function getSeason() {
				return SEASONS[G.seasonIdx];
			}
			function rollWeather() {
				const pool = WEATHER_POOL[getSeason().id];
				let r = Math.random(),
					cum = 0;
				for (const w of pool) {
					cum += w.prob;
					if (r < cum) return w;
				}
				return pool[0];
			}
			function getGrowMod(coffeeId) {
				const c = COFFEE[coffeeId];
				return (c.weatherBonus[G.weather.id] || 1) * (c.seasonBonus[getSeason().id] || 1);
			}
			function advanceDay() {
				G.day++;
				dayT = Date.now();
				if ((G.day - 1) % 7 === 0) G.seasonIdx = (G.seasonIdx + 1) % SEASONS.length;
				G.weather = rollWeather();
				for (let r = 0; r < WORLD_ROWS; r++)
					for (let c = 0; c < FARM_END; c++) {
						const p = plots[r][c];
						if (p.state >= PS.SPROUT && p.state < PS.RIPE && p.coffeeType) p.weatherHistory.push(getGrowMod(p.coffeeType));
					}
				updateWeatherUI();
				updateHUD();
				refreshPanel();
				showToast(`📅 Hari ${G.day} — ${getSeason().name} ${G.weather.icon} ${G.weather.name}`);
			}
			let dayFrac = 0;
			function updateDayBar() {
				dayFrac = Math.min((Date.now() - dayT) / 90000, 1);
				document.getElementById("dayfill").style.width = dayFrac * 100 + "%";
				const labels = ["Dini Hari", "Subuh", "Pagi", "Siang", "Sore", "Malam"];
				document.getElementById("daytime-txt").textContent = labels[Math.min(Math.floor(dayFrac * 6), 5)];
				if (dayFrac >= 1) advanceDay();
			}
			function updateWeatherUI() {
				const s = getSeason(),
					w = G.weather;
				document.getElementById("weather-icon").textContent = w.icon;
				document.getElementById("weather-txt").textContent = w.name;
				const sb = document.getElementById("season-txt");
				sb.textContent = s.badge + " " + s.name;
				sb.style = s.badgeStyle;
				document.getElementById("h-day").textContent = G.day;
			}

			// ════════ GROWTH ════════
			function updateGrowth() {
				const now = Date.now();
				let anyRipe = false;
				for (let r = 0; r < WORLD_ROWS; r++)
					for (let c = 0; c < FARM_END; c++) {
						const p = plots[r][c];
						if (p.state < PS.SPROUT || p.state >= PS.RIPE || !p.coffeeType) continue;
						const base = COFFEE[p.coffeeType].growTime[p.state];
						const eff = base / getGrowMod(p.coffeeType);
						if (now - p.growT > eff) {
							p.state++;
							p.growT = now;
							if (p.state === PS.RIPE) anyRipe = true;
						}
					}
				if (anyRipe) showToast("☕ Kopi siap dipanen!");
			}

			// ════════ ACTION SYSTEM ════════
			function doAction() {
				if (player.isActing) return;
				// Only farm actions on farm tiles
				if (player.x >= ROAD_START) return;
				const p = plots[player.y]?.[player.x];
				if (!p) return;
				const screenC = player.x - camX;
				const px = screenC * TILE + TILE / 2,
					py = player.y * TILE + TILE / 2;
				let msg = "",
					ok = false;
				if (G.tool === "dig") {
					if (p.state === PS.EMPTY) {
						p.state = PS.DUG;
						msg = "⛏ Tanah digali!";
						ok = true;
						setAnim("dig");
						player.isActing = true;
						spawnParticles(px, py + 10, "dirt");
						setTimeout(() => spawnParticles(px - 8, py + 14, "dirt"), 200);
						setTimeout(() => spawnParticles(px + 6, py + 16, "dirt"), 350);
					} else msg = "Sudah digali.";
				} else if (G.tool === "sow") {
					const sid = G.selectedSeed;
					if (p.state !== PS.DUG) msg = "Gali dulu!";
					else if (!G.seedStock[sid] || G.seedStock[sid] <= 0) msg = `Benih ${COFFEE[sid].name} habis!`;
					else {
						p.state = PS.SEEDED;
						p.coffeeType = sid;
						p.growT = Date.now();
						p.weatherHistory = [];
						G.seedStock[sid]--;
						ok = true;
						msg = `🌱 ${COFFEE[sid].emoji} ${COFFEE[sid].name} ditanam!`;
						setAnim("sow");
						player.isActing = true;
						spawnParticles(px + 12, py + 8, "seed");
					}
				} else if (G.tool === "water") {
					if (p.state === PS.SEEDED) {
						p.state = PS.SPROUT;
						p.growT = Date.now();
						p.weatherHistory.push(getGrowMod(p.coffeeType));
						ok = true;
						const mod = getGrowMod(p.coffeeType);
						msg = `💧 Disiram! Bonus: ${mod > 1 ? "+" : ""}${Math.round((mod - 1) * 100)}%`;
						setAnim("water");
						player.isActing = true;
						setTimeout(() => spawnParticles(px + 8, py + 12, "water"), 600);
						setTimeout(() => spawnParticles(px + 6, py + 14, "water"), 900);
					} else if (p.state >= PS.SPROUT && p.state < PS.RIPE) {
						p.weatherHistory.push(getGrowMod(p.coffeeType));
						ok = true;
						msg = "💧 Disiram!";
						setAnim("water");
						player.isActing = true;
						setTimeout(() => spawnParticles(px + 8, py + 12, "water"), 600);
					} else msg = "Tidak ada tanaman.";
				} else if (G.tool === "harvest") {
					if (p.state === PS.RIPE) {
						const ct = p.coffeeType;
						G.inventory[ct] = (G.inventory[ct] || 0) + 1;
						const wh = p.weatherHistory;
						const q = wh.length ? wh.reduce((a, b) => a + b, 0) / wh.length : 1;
						const ql = q > 1.5 ? "Istimewa★★★" : q > 1.2 ? "Premium★★" : q > 0.8 ? "Baik★" : "Biasa";
						p.state = PS.EMPTY;
						p.coffeeType = null;
						p.weatherHistory = [];
						ok = true;
						msg = `🧺 Panen ${COFFEE[ct].emoji} [${ql}]! +1`;
						setAnim("harvest");
						player.isActing = true;
						spawnParticles(px, py, "sparkle");
						setTimeout(() => spawnParticles(px - 6, py - 4, "leaf"), 300);
						setTimeout(() => spawnParticles(px + 6, py - 6, "sparkle"), 500);
					} else if (p.state > PS.EMPTY) msg = "Belum siap ⏳";
					else msg = "Tidak ada tanaman.";
				}
				if (ok) updateHUD();
				refreshPanel();
				showToast(msg);
			}

			// ════════ SELL TO NPC ════════
			function calcPrice(coffeeId, npc) {
				const base = COFFEE[coffeeId].basePrice;
				const npcMod = npc.wants[coffeeId] || 0.5;
				const wMod = getGrowMod(coffeeId);
				const bonus = npc.bonusCondition(getSeason().id) || npc.bonusCondition(G.weather.id) ? 1.3 : 1;
				return Math.round(base * npcMod * wMod * bonus);
			}

			// Called when player clicks NPC bubble
			function openNPCSellDialog(npc) {
				// Cek apakah ada kopi di inventory
				const hasAny = Object.entries(G.inventory).some(([id, qty]) => qty > 0);
				if (!hasAny) {
					showToast(`${npc.avatar} ${npc.name}: "Kamu tidak punya kopi!"`, 2200);
					return;
				}

				// Langsung jual semua kopi yang ada ke NPC ini
				let totalEarned = 0;
				let soldList = [];

				for (const [id, qty] of Object.entries(G.inventory)) {
					if (qty <= 0) continue;
					const price = calcPrice(id, npc);
					const earned = price * qty;
					G.gold += earned;
					G.inventory[id] = 0;
					totalEarned += earned;
					soldList.push(`${COFFEE[id].emoji}${COFFEE[id].name}×${qty}(${price}rp/biji)`);
				}

				// Efek koin di posisi NPC
				const screenC = npc.worldX - camX;
				const sx = screenC * TILE + TILE;
				const sy = (npc.worldY + 3) * TILE;
				spawnParticles(sx, sy, "coin");
				spawnParticles(sx - 10, sy - 10, "coin");

				showToast(`💰 ${npc.name}: ${soldList.join(", ")} = +${totalEarned}rp!`, 3500);
				updateHUD();
				refreshPanel();
			}

			function buySeed(id) {
				const cost = COFFEE[id].seedCost;
				if (G.gold < cost) {
					showToast("💰 Uang kurang!");
					return;
				}
				G.gold -= cost;
				G.seedStock[id] = (G.seedStock[id] || 0) + 3;
				showToast(`🛒 Beli 3× ${COFFEE[id].name} — -${cost}rp`);
				updateHUD();
				refreshPanel();
			}
			function sellCoffee(id, npcId) {
				const npc = NPC_TEMPLATES.find((n) => n.id === npcId);
				if (!npc) return;
				if (!G.inventory[id] || G.inventory[id] <= 0) {
					showToast("Tidak ada kopi!");
					return;
				}
				const price = calcPrice(id, npc);
				G.gold += price;
				G.inventory[id]--;
				const screenC = npc.worldX - camX;
				const sx = screenC * TILE + TILE;
				const sy = (npc.worldY + 3) * TILE;
				spawnParticles(sx, sy, "coin");
				showToast(`💰 Jual ${COFFEE[id].emoji} → ${npc.name}: +${price}rp`);
				updateHUD();
				refreshPanel();
			}

			// ════════ HUD ════════
			function updateHUD() {
				document.getElementById("h-gold").textContent = G.gold;
				const s = G.seedStock[G.selectedSeed] || 0;
				document.getElementById("h-seed-icon").textContent = COFFEE[G.selectedSeed].emoji;
				document.getElementById("h-seed-qty").textContent = s;
				const total = Object.values(G.inventory).reduce((a, b) => a + b, 0);
				document.getElementById("h-inv").textContent = total;

				document.getElementById("h-zone").textContent = zone;

				if (player.x < ROAD_START) {
					document.getElementById("plot-txt").textContent = p ? PS_LBL[p.state] + pt : "—";
				} else if (player.x < MARKET_START) {
					document.getElementById("plot-txt").textContent = "🚶 Menuju pasar...";
				} else {
					// Check NPC proximity
					const nearNPC = NPC_TEMPLATES.find((n) => Math.abs(player.x - n.worldX) <= 3 && Math.abs(player.y - (n.worldY + 3)) <= 2);

			function setTool(t) {
				G.tool = t;
				["dig", "sow", "water", "harvest"].forEach((x) => document.getElementById("btn-" + x).classList.toggle("on", x === t));
			}
			function showToast(msg, dur = 2200) {
				const el = document.getElementById("toast");
				el.textContent = msg;
				el.classList.add("show");
				clearTimeout(toastTimer);
				toastTimer = setTimeout(() => el.classList.remove("show"), dur);
			}

			// ════════ ANIM CONTROLLER ════════
			function setAnim(name) {
				if (player.anim === name) return;
				player.anim = name;
				player.frame = 0;
				player.frameTimer = 0;
			}
			function stepAnim(dt) {
				const a = ANIMS[player.anim];
				if (!a) return;
				player.frameTimer += dt;
				const frameDur = 1000 / a.fps;
				if (player.frameTimer >= frameDur) {
					player.frameTimer -= frameDur;
					if (player.frame < a.frames.length - 1) {
						player.frame++;
					} else if (a.loop) {
						player.frame = 0;
					} else {
						player.isActing = false;
						player.frame = 0;
						setAnim("idle_down");
					}
				}
			}

			// ════════ INPUT ════════
			document.addEventListener("keydown", (e) => {
				keys[e.key] = true;
				if (e.key === "e" || e.key === "E" || e.key === " ") {
					e.preventDefault();
					// Check NPC interaction
					const nearNPC = NPC_TEMPLATES.find((n) => Math.abs(player.x - n.worldX) <= 3 && Math.abs(player.y - (n.worldY + 3)) <= 2);
					if (nearNPC) openNPCSellDialog(nearNPC);
					else doAction();
				}
				if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) e.preventDefault();
				if (e.key === "1") setTool("dig");
				if (e.key === "2") setTool("sow");
				if (e.key === "3") setTool("water");
				if (e.key === "4") setTool("harvest");
				if (e.key === "Tab") {
					e.preventDefault();
					togglePanel();
				}
			});
			document.addEventListener("keyup", (e) => (keys[e.key] = false));

			gc.addEventListener("click", (e) => {
				if (player.isActing) return;
				const rect = gc.getBoundingClientRect();
				const sx = CW / rect.width,
					sy = CH / rect.height;
				const mx = (e.clientX - rect.left) * sx;
				const my = (e.clientY - rect.top) * sy;

				// Check click on NPC chat bubble
				for (const npc of NPC_TEMPLATES) {
					const screenC = npc.worldX - camX;
					if (screenC < 0 || screenC > VIEW_COLS) continue;
					const npcScreenX = screenC * TILE + TILE;
					const npcScreenY = (npc.worldY + 3) * TILE + TILE * 0.5;
					const bubbleY = npcScreenY - 18 - 22 - 8;
					const bubbleX = npcScreenX - 28;
					if (mx >= bubbleX && mx <= bubbleX + 56 && my >= bubbleY && my <= bubbleY + 30) {
						// Check player is nearby
						const distX = Math.abs(player.x - npc.worldX);
						const distY = Math.abs(player.y - (npc.worldY + 3));
						if (distX <= 4 && distY <= 3) {
							openNPCSellDialog(npc);
							return;
						} else {
							showToast(`Dekati ${npc.name} dulu!`);
							return;
						}
					}
				}

				// Normal tile click: move player
				const tc = Math.floor(mx / TILE) + camX;
				const tr = Math.floor(my / TILE);
				if (tc >= 0 && tc < WORLD_COLS && tr >= 0 && tr < WORLD_ROWS) {
					player.x = tc;
					player.y = tr;
					updateCamera();
					updateHUD();
					setTimeout(doAction, 50);
				}
			});

			// ════════ PLAYER MOVEMENT ════════
			function updatePlayer(dt) {
				if (player.isActing) {
					stepAnim(dt);
					return;
				}
				const now = Date.now();
				if (now - lastMoveT < 140) {
					if (!player.moving) setAnim("idle_down");
					stepAnim(dt);
					return;
				}
				let dx = 0,
					dy = 0;
				if (keys["ArrowUp"] || keys["w"] || keys["W"]) {
					dy = -1;
					player.dir = "up";
				} else if (keys["ArrowDown"] || keys["s"] || keys["S"]) {
					dy = 1;
					player.dir = "down";
				} else if (keys["ArrowLeft"] || keys["a"] || keys["A"]) {
					dx = -1;
					player.dir = "left";
				} else if (keys["ArrowRight"] || keys["d"] || keys["D"]) {
					dx = 1;
					player.dir = "right";
				}
				if (dx || dy) {
					const nx = player.x + dx,
						ny = player.y + dy;
					if (nx >= 0 && nx < WORLD_COLS && ny >= 0 && ny < WORLD_ROWS) {
						player.x = nx;
						player.y = ny;
					}
					player.moving = true;
					lastMoveT = now;
					setAnim("walk_" + player.dir);
					updateCamera();
					updateHUD();
				} else {
					if (player.moving) {
						setAnim("idle_down");
						player.moving = false;
					}
				}
				stepAnim(dt);
			}

			// ════════ WEATHER OVERLAY ════════
			function drawWeatherOverlay(ts) {
				if (G.weather.id === "hujan" || G.weather.id === "gerimis") {
					ctx.fillStyle = "rgba(30,60,120,0.06)";
					ctx.fillRect(0, 0, CW, CH);
					ctx.strokeStyle = "rgba(80,140,220,0.15)";
					ctx.lineWidth = 1;
					const rs = Math.floor(ts / 20) % 20;
					for (let i = 0; i < 25; i++) {
						const rx = (i * 61 + rs * 7) % CW,
							ry = (i * 37 + rs * 11) % CH;
						ctx.beginPath();
						ctx.moveTo(rx, ry);
						ctx.lineTo(rx - 2, ry + 8);
						ctx.stroke();
					}
				} else if (G.weather.id === "panas") {
					ctx.fillStyle = "rgba(120,60,0,0.05)";
					ctx.fillRect(0, 0, CW, CH);
				}
			}

			// ════════ MAIN LOOP ════════
			let lastT = 0;
			function gameLoop(ts) {
				const dt = ts - lastT;
				lastT = ts;
				updateGrowth();
				updatePlayer(dt);
				updateParticles();
				updateDayBar();
				ctx.clearRect(0, 0, CW, CH);
				drawWeatherOverlay(ts);
				// Draw tiles
				for (let r = 0; r < VIEW_ROWS; r++) {
					for (let sc = 0; sc < VIEW_COLS; sc++) {
						const wc = sc + camX;
						drawTile(sc, r, wc);
						if (wc >= ROAD_START && wc < MARKET_START) drawRoadDecor(sc, r, wc);
						if (wc >= MARKET_START) drawMarketDecor(sc, r, wc);
					}
				}
				drawMarketArea();
				drawParticles();
				drawCharacter();
				drawMinimap();
				requestAnimationFrame(gameLoop);
			}

			function resetGame() {

			// ════════ MOBILE JOYSTICK ════════
			(function () {
				const zone = document.getElementById("joystick-zone");
				const base = document.getElementById("joystick-base");
				const thumb = document.getElementById("joystick-thumb");
				const actBtn = document.getElementById("btn-act-action");

				if (!zone) return;

				const RADIUS = 35; // max geser thumb
				let active = false,
					startX = 0,
					startY = 0;
				let jDir = { x: 0, y: 0 };
				let jMoveInterval = null;

				function getCenter() {
					const r = base.getBoundingClientRect();
					return { cx: r.left + r.width / 2, cy: r.top + r.height / 2 };
				}

				function setThumb(dx, dy) {
					const dist = Math.sqrt(dx * dx + dy * dy);
					const clamped = Math.min(dist, RADIUS);
					const angle = Math.atan2(dy, dx);
					const tx = Math.cos(angle) * clamped;
					const ty = Math.sin(angle) * clamped;
					// thumb center di base center
					const bw = base.offsetWidth,
						bh = base.offsetHeight;
					thumb.style.left = bw / 2 - thumb.offsetWidth / 2 + tx + "px";
					thumb.style.top = bh / 2 - thumb.offsetHeight / 2 + ty + "px";
					// Arah dominan
					jDir.x = Math.abs(tx) > 10 ? Math.sign(tx) : 0;
					jDir.y = Math.abs(ty) > 10 ? Math.sign(ty) : 0;
					// Prioritas horizontal/vertikal
					if (Math.abs(tx) >= Math.abs(ty)) jDir.y = 0;
					else jDir.x = 0;
				}

				function resetThumb() {
					const bw = base.offsetWidth,
						bh = base.offsetHeight;
					thumb.style.left = bw / 2 - thumb.offsetWidth / 2 + "px";
					thumb.style.top = bh / 2 - thumb.offsetHeight / 2 + "px";
					jDir.x = 0;
					jDir.y = 0;
				}

				function startMove() {
					if (jMoveInterval) return;
					jMoveInterval = setInterval(() => {
						if (!active || (jDir.x === 0 && jDir.y === 0)) return;
						const nx = player.x + jDir.x;
						const ny = player.y + jDir.y;
						if (nx >= 0 && nx < WORLD_COLS && ny >= 0 && ny < WORLD_ROWS) {
							player.x = nx;
							player.y = ny;
						}
						// Set anim arah
						if (jDir.x > 0) {
							player.dir = "right";
							setAnim("walk_right");
						} else if (jDir.x < 0) {
							player.dir = "left";
							setAnim("walk_left");
						} else if (jDir.y < 0) {
							player.dir = "up";
							setAnim("walk_up");
						} else if (jDir.y > 0) {
							player.dir = "down";
							setAnim("walk_down");
						}
						player.moving = true;
						lastMoveT = Date.now();
						updateCamera();
						updateHUD();
					}, 150);
				}

				function stopMove() {
					clearInterval(jMoveInterval);
					jMoveInterval = null;
					resetThumb();
					player.moving = false;
					setAnim("idle_down");
				}

				// Touch events joystick
				zone.addEventListener(
					"touchstart",
					(e) => {
						e.preventDefault();
						active = true;
						const t = e.touches[0];
						startX = t.clientX;
						startY = t.clientY;
						startMove();
					},
					{ passive: false },
				);

				zone.addEventListener(
					"touchmove",
					(e) => {
						e.preventDefault();
						if (!active) return;
						const t = e.touches[0];
						setThumb(t.clientX - startX, t.clientY - startY);
					},
					{ passive: false },
				);

				zone.addEventListener(
					"touchend",
					(e) => {
						e.preventDefault();
						active = false;
						stopMove();
					},
					{ passive: false },
				);

				// Mouse fallback (untuk test di desktop)
				zone.addEventListener("mousedown", (e) => {
					active = true;
					startX = e.clientX;
					startY = e.clientY;
					startMove();
					const onMove = (ev) => setThumb(ev.clientX - startX, ev.clientY - startY);
					const onUp = () => {
						active = false;
						stopMove();
						document.removeEventListener("mousemove", onMove);
						document.removeEventListener("mouseup", onUp);
					};
					document.addEventListener("mousemove", onMove);
					document.addEventListener("mouseup", onUp);
				});

				// Tombol AKSI (E) — jual ke NPC terdekat atau lakukan aksi
				// actBtn.addEventListener(
				// 	"touchstart",
				// 	(e) => {
				// 		e.preventDefault();
				// 		const nearNPC = NPC_TEMPLATES.find((n) => Math.abs(player.x - n.worldX) <= 3 && Math.abs(player.y - (n.worldY + 3)) <= 2);
				// 		if (nearNPC) openNPCSellDialog(nearNPC);
				// 		else doAction();
				// 	},
				// 	{ passive: false },
				// );
				// actBtn.addEventListener("click", () => {
				// 	const nearNPC = NPC_TEMPLATES.find((n) => Math.abs(player.x - n.worldX) <= 3 && Math.abs(player.y - (n.worldY + 3)) <= 2);
				// 	if (nearNPC) openNPCSellDialog(nearNPC);
				// 	else doAction();
				// });

				// Inisialisasi posisi thumb di tengah
				resetThumb();
			})();

			// ════════ FULLSCREEN ════════
			function toggleFullscreen() {
				const screenEl = document.getElementById("screen");
				const isFS = !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement);

				if (!isFS) {
					// Semua platform: fullscreen elemen screen saja
					const req = screenEl.requestFullscreen || screenEl.webkitRequestFullscreen || screenEl.mozRequestFullScreen;
					if (req) req.call(screenEl);
				} else {
					const ex = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen;
					if (ex) ex.call(document);
				}
			}

			// Update icon & label saat state fullscreen berubah
			function onFSChange() {
				const isFS = !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement);
				document.getElementById("fs-icon").textContent = isFS ? "✕" : "⛶";
				document.getElementById("fs-label").textContent = isFS ? "EXIT" : "FULLSCREEN";

				const screenEl = document.getElementById("screen");
				if (isFS) {
					// Hitung scale sambil jaga rasio 640:400
					const scaleX = window.innerWidth / CW;
					const scaleY = window.innerHeight / CH;
					const scale = Math.min(scaleX, scaleY);

					// Canvas scale, bukan stretch
					gc.style.width = Math.round(CW * scale) + "px";
					gc.style.height = Math.round(CH * scale) + "px";

					// Screen hanya bungkus canvas — tidak paksa 100vh
					screenEl.style.cssText = `
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            border: none;
            border-radius: 0;
            box-shadow: none;
            z-index: 9999;
            overflow: hidden;
        `;
				} else {
					gc.style.width = "";
					gc.style.height = "";
					screenEl.style.cssText = "";
				}
			}

			document.addEventListener("fullscreenchange", onFSChange);
			document.addEventListener("webkitfullscreenchange", onFSChange);
			document.addEventListener("mozfullscreenchange", onFSChange);

			// ════════ MOBILE ACTION FIX ════════
			function forceMobileAction() {
				// Reset paksa isActing agar aksi selalu bisa dijalankan di mobile
				player.isActing = false;
				doAction();
			}

			function forceMobileAksi() {
				player.isActing = false;
				const nearNPC = NPC_TEMPLATES.find((n) => Math.abs(player.x - n.worldX) <= 4 && Math.abs(player.y - (n.worldY + 3)) <= 3);
				if (nearNPC) openNPCSellDialog(nearNPC);
				else forceMobileAction();
			}

			// ════════ MOBILE BUTTON EVENTS ════════
			(function () {
				const btnMap = [
					{
						id: "btn-act-water",
						fn: () => {
							setTool("water");
							forceMobileAction();
						},
					},
					{
						id: "btn-act-dig",
						fn: () => {
							setTool("dig");
							forceMobileAction();
						},
					},
					{
						id: "btn-act-sow",
						fn: () => {
							setTool("sow");
							forceMobileAction();
						},
					},
					{
						id: "btn-act-harvest",
						fn: () => {
							setTool("harvest");
							forceMobileAction();
						},
					},
					{
						id: "btn-act-action",
						fn: () => {
							forceMobileAksi();
						},
					},
				];
				btnMap.forEach(({ id, fn }) => {
					const el = document.getElementById(id);
					if (!el) return;
					el.addEventListener(
						"touchstart",
						(e) => {
							e.preventDefault();
							fn();
						},
						{ passive: false },
					);
					el.addEventListener("click", fn);
				});
			})();

			// ════════ INIT ════════
			initPlots();
			updateCamera();
			updateWeatherUI();
			updateHUD();
			refreshPanel();
			requestAnimationFrame(gameLoop);
		</script>
