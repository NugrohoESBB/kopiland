<!doctype html>
<html lang="id">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Kopi Farm — Sengoku Adventure</title>
		<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet" />
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
				image-rendering: pixelated;
			}
			body {
				background: #0d1117;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: flex-start;
				min-height: 100vh;
				font-family: "VT323", monospace;
				overflow-x: hidden;
			}
			#screen {
				position: relative;
				width: 640px;
				max-width: 100vw;
				background: #000;
				border: 4px solid #4a3a2a;
				border-radius: 4px;
				overflow: hidden;
				box-shadow: 0 0 40px rgba(80, 60, 20, 0.4);
			}

			/* HUD */
			#hud {
				display: flex;
				gap: 0;
				background: #1a1408;
				border-bottom: 3px solid #4a3a2a;
				flex-wrap: wrap;
			}
			.hud-cell {
				padding: 6px 14px;
				border-right: 2px solid #4a3a2a;
				font-size: 18px;
				color: #c8a84a;
				white-space: nowrap;
				display: flex;
				align-items: center;
				gap: 6px;
			}
			.hud-cell span {
				color: #f9e08a;
				font-weight: bold;
			}
			#hud-action {
				flex: 1;
				text-align: right;
				padding: 6px 12px;
				font-size: 14px;
				color: #6a5a3a;
			}

			/* Game canvas */
			#game-canvas {
				display: block;
				width: 100%;
				cursor: crosshair;
			}

			/* Action overlay */
			#action-overlay {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: rgba(0, 0, 0, 0);
				display: none;
				align-items: center;
				justify-content: center;
				z-index: 10;
				transition: background 0.3s;
				pointer-events: none;
			}
			#action-overlay.active {
				display: flex;
				background: rgba(0, 0, 0, 0.55);
			}

			#action-panel {
				position: relative;
				border: 6px solid #8a6a30;
				border-radius: 4px;
				background: #0d0a05;
				box-shadow:
					0 0 0 3px #4a3a1a,
					0 0 0 6px #2a1a08,
					inset 0 0 30px rgba(0, 0, 0, 0.6);
				overflow: hidden;
				transform: scale(0.8);
				transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
			}
			#action-overlay.active #action-panel {
				transform: scale(1);
			}

			#action-gif {
				display: block;
				width: 384px;
				max-width: 80vw;
				height: auto;
				image-rendering: pixelated;
			}

			#action-label {
				position: absolute;
				bottom: 0;
				left: 0;
				right: 0;
				background: rgba(10, 8, 3, 0.85);
				border-top: 3px solid #8a6a30;
				padding: 6px 16px;
				font-family: "Press Start 2P", monospace;
				font-size: 11px;
				color: #f9e08a;
				text-align: center;
				letter-spacing: 1px;
			}

			/* Tool buttons */
			#toolbar {
				display: flex;
				gap: 0;
				background: #12100a;
				border-top: 3px solid #4a3a2a;
			}
			.tool-btn {
				flex: 1;
				padding: 10px 4px;
				border: none;
				background: transparent;
				font-family: "VT323", monospace;
				font-size: 20px;
				color: #8a7a5a;
				cursor: pointer;
				border-right: 2px solid #2a2018;
				transition: all 0.1s;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 2px;
				line-height: 1;
			}
			.tool-btn:last-child {
				border-right: none;
			}
			.tool-btn .t-label {
				font-size: 13px;
				color: #5a4a2a;
			}
			.tool-btn:hover {
				background: #1e1a10;
				color: #c8a84a;
			}
			.tool-btn.active {
				background: #2a2010;
				color: #f9e08a;
				border-bottom: 3px solid #f9a030;
			}
			.tool-btn.active .t-label {
				color: #c8a030;
			}

			/* Intro screen */
			#intro {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: #000;
				z-index: 20;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 16px;
			}
			#intro-gif {
				width: 100%;
				display: block;
				image-rendering: pixelated;
			}
			#intro-overlay {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: linear-gradient(to bottom, rgba(0, 0, 0, 0.1) 0%, rgba(0, 0, 0, 0.7) 100%);
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: flex-end;
				padding-bottom: 30px;
				gap: 14px;
			}
			#intro h1 {
				font-family: "Press Start 2P", monospace;
				font-size: 16px;
				color: #f9e08a;
				text-shadow: 2px 2px #8a4a00;
				text-align: center;
				line-height: 1.6;
			}
			#start-btn {
				font-family: "Press Start 2P", monospace;
				font-size: 11px;
				background: #2a6a1a;
				color: #90f050;
				border: 3px solid #60c030;
				padding: 12px 28px;
				cursor: pointer;
				border-radius: 2px;
				animation: blink 1s step-end infinite;
			}
			@keyframes blink {
				0%,
				100% {
					opacity: 1;
				}
				50% {
					opacity: 0.3;
				}
			}

			/* Message toast */
			#toast {
				position: absolute;
				top: 52px;
				left: 50%;
				transform: translateX(-50%);
				background: rgba(10, 8, 2, 0.9);
				border: 2px solid #8a6a20;
				color: #f9e08a;
				padding: 5px 18px;
				border-radius: 2px;
				font-size: 18px;
				white-space: nowrap;
				opacity: 0;
				transition: opacity 0.25s;
				z-index: 15;
				pointer-events: none;
			}
			#toast.show {
				opacity: 1;
			}

			/* Controls hint */
			#hint {
				background: #0a0804;
				padding: 6px 14px;
				font-size: 13px;
				color: #4a3a1a;
				text-align: center;
				border-top: 2px solid #2a1a08;
			}
		</style>
	</head>

				// Base tile
				if (p.state === PS.EMPTY) {
					ctx.fillStyle = even ? GRASS : GRASS_DARK;
					ctx.fillRect(x, y, TILE, TILE);
					// Grass texture dots
					ctx.fillStyle = "rgba(0,0,0,0.12)";
					for (let i = 0; i < 4; i++) ctx.fillRect(x + 4 + i * 11, y + 6 + (i % 2) * 8, 3, 5);
				} else {
					ctx.fillStyle = p.state === PS.DUG ? SOIL_DUG : SOIL_BASE;
					ctx.fillRect(x, y, TILE, TILE);
					// Soil texture
					ctx.fillStyle = "rgba(0,0,0,0.15)";
					for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) ctx.fillRect(x + 5 + i * 14, y + 5 + j * 14, 8, 4);
				}

				// Grid border
				ctx.strokeStyle = TILE_BORDER;
				ctx.lineWidth = 1;
				ctx.strokeRect(x, y, TILE, TILE);

				// Current tile highlight
				if (c === player.x && r === player.y) {
					ctx.strokeStyle = "rgba(255,240,120,0.7)";
					ctx.lineWidth = 2.5;
					ctx.strokeRect(x + 1, y + 1, TILE - 2, TILE - 2);
				}

				// Plant rendering
				drawPlant(p, cx, cy, now);
			}

			function drawPlant(p, cx, cy, now) {
				if (p.state < PS.SEEDED) return;
				const y_base = cy + 14;

				if (p.state === PS.SEEDED) {
					// Seed dot
					ctx.fillStyle = "#c8902a";
					ctx.beginPath();
					ctx.ellipse(cx, cy + 4, 5, 3, 0, 0, Math.PI * 2);
					ctx.fill();
					ctx.fillStyle = "#a06818";
					ctx.fillRect(cx - 2, cy + 2, 4, 4);
				}

				if (p.state === PS.SPROUT) {
					// Small sprout
					ctx.fillStyle = "#5a8a1a";
					ctx.fillRect(cx - 2, cy + 2, 4, 14);
					ctx.fillStyle = "#7abe2a";
					ctx.beginPath();
					ctx.ellipse(cx - 5, cy + 2, 7, 4, -0.4, 0, Math.PI * 2);
					ctx.fill();
					ctx.beginPath();
					ctx.ellipse(cx + 5, cy, 7, 4, 0.4, 0, Math.PI * 2);
					ctx.fill();
				}

				if (p.state === PS.YOUNG) {
					// Young tree
					ctx.fillStyle = "#7b4226";
					ctx.fillRect(cx - 3, cy + 4, 6, 14);
					ctx.fillStyle = "#4a8a1a";
					ctx.beginPath();
					ctx.arc(cx, cy - 2, 12, 0, Math.PI * 2);
					ctx.fill();
					ctx.fillStyle = "#70c030";
					ctx.beginPath();
					ctx.arc(cx - 6, cy - 5, 6, 0, Math.PI * 2);
					ctx.fill();
					ctx.beginPath();
					ctx.arc(cx + 6, cy - 4, 6, 0, Math.PI * 2);
					ctx.fill();
				}

				if (p.state === PS.MATURE) {
					// Mature tree
					ctx.fillStyle = "#7b4226";
					ctx.fillRect(cx - 4, cy + 5, 8, 16);
					ctx.fillStyle = "#2d6a10";
					ctx.beginPath();
					ctx.arc(cx, cy - 5, 16, 0, Math.PI * 2);
					ctx.fill();
					ctx.fillStyle = "#50a020";
					ctx.beginPath();
					ctx.arc(cx - 8, cy - 8, 9, 0, Math.PI * 2);
					ctx.fill();
					ctx.beginPath();
					ctx.arc(cx + 8, cy - 5, 8, 0, Math.PI * 2);
					ctx.fill();
					ctx.beginPath();
					ctx.arc(cx, cy - 12, 7, 0, Math.PI * 2);
					ctx.fill();
				}

				if (p.state === PS.RIPE) {
					// Ripe coffee tree with berries!
					ctx.fillStyle = "#7b4226";
					ctx.fillRect(cx - 4, cy + 5, 8, 16);
					ctx.fillStyle = "#2d6a10";
					ctx.beginPath();
					ctx.arc(cx, cy - 5, 16, 0, Math.PI * 2);
					ctx.fill();
					ctx.fillStyle = "#50a020";
					ctx.beginPath();
					ctx.arc(cx - 8, cy - 8, 9, 0, Math.PI * 2);
					ctx.fill();
					ctx.beginPath();
					ctx.arc(cx + 8, cy - 5, 8, 0, Math.PI * 2);
					ctx.fill();
					ctx.beginPath();
					ctx.arc(cx, cy - 12, 7, 0, Math.PI * 2);
					ctx.fill();
					// Red coffee berries
					ctx.fillStyle = "#d02020";
					const berryPts = [
						[-7, -8],
						[5, -10],
						[0, -5],
						[-5, -3],
						[7, -4],
						[2, -13],
					];
					berryPts.forEach(([bx, by]) => {
						ctx.beginPath();
						ctx.arc(cx + bx, cy + by, 3, 0, Math.PI * 2);
						ctx.fill();
					});
					ctx.fillStyle = "#ff5040";
					berryPts.slice(0, 3).forEach(([bx, by]) => {
						ctx.beginPath();
						ctx.arc(cx + bx + 0.5, cy + by - 0.5, 1.5, 0, Math.PI * 2);
						ctx.fill();
					});
					// Pulse indicator
					const pulse = 0.5 + 0.5 * Math.sin(now / 400);
					ctx.fillStyle = `rgba(255,220,50,${pulse * 0.9})`;
					ctx.font = "bold 14px VT323, monospace";
					ctx.textAlign = "center";
					ctx.fillText("!", cx, cy - 22);
					ctx.textAlign = "start";
				}
			}

			function drawPlayer() {
				const px = player.x * TILE + TILE / 2,
					py = player.y * TILE + TILE / 2;
				const t = Date.now();
				const bob = player.moving ? Math.sin(t / 110) * 2.5 : 0;
				const sq = player.moving ? Math.abs(Math.sin(t / 110)) * 0.08 : 0; // squash&stretch

				ctx.save();
				ctx.translate(px, py + bob);
				ctx.scale(1 + sq, 1 - sq * 0.5);

				const dir = player.dir;

				// Shadow
				ctx.fillStyle = "rgba(0,0,0,0.25)";
				ctx.beginPath();
				ctx.ellipse(0, 14, 10, 4, 0, 0, Math.PI * 2);
				ctx.fill();

				// Legs with walk animation
				const legSwing = player.moving ? Math.sin(t / 110) * 5 : 0;
				ctx.fillStyle = "#a0622a";
				if (dir !== 0 && dir !== 2) {
					ctx.fillRect(-5, 2, 4, 10);
					ctx.fillRect(1, 2, 4, 10);
				} else {
					ctx.save();
					ctx.translate(-3, 7);
					ctx.rotate((legSwing * Math.PI) / 180);
					ctx.fillRect(-2, -5, 4, 8);
					ctx.restore();
					ctx.save();
					ctx.translate(3, 7);
					ctx.rotate((-legSwing * Math.PI) / 180);
					ctx.fillRect(-2, -5, 4, 8);
					ctx.restore();
				}

				// Body (shirt - blue)
				ctx.fillStyle = "#3a7ac8";
				ctx.fillRect(-7, -7, 14, 11);

				// Overalls
				ctx.fillStyle = "#2a5a9a";
				ctx.fillRect(-7, 0, 4, 5);
				ctx.fillRect(3, 0, 4, 5);

				// Arms
				ctx.fillStyle = "#d4956a";
				if (dir === 1) {
					ctx.fillRect(7, -6, 4, 4);
				} else if (dir === 3) {
					ctx.fillRect(-11, -6, 4, 4);
				} else {
					ctx.fillRect(-10, -4, 4, 5);
					ctx.fillRect(6, -4, 4, 5);
				}

				// Head
				ctx.fillStyle = "#e8b07a";
				ctx.beginPath();
				ctx.arc(0, -13, 7, 0, Math.PI * 2);
				ctx.fill();

				// Hair
				ctx.fillStyle = "#8b4513";
				ctx.fillRect(-7, -20, 14, 9);
				ctx.beginPath();
				ctx.arc(0, -20, 7, Math.PI, Math.PI * 2);
				ctx.fill();

				// Eyes
				ctx.fillStyle = "#1a1a1a";
				if (dir === 0) {
					ctx.fillRect(-3, -15, 2, 2);
					ctx.fillRect(1, -15, 2, 2);
				} else if (dir === 2) {
					ctx.fillRect(-3, -12, 2, 2);
					ctx.fillRect(1, -12, 2, 2);
				} else if (dir === 1) {
					ctx.fillRect(2, -13, 2, 2);
				} else {
					ctx.fillRect(-4, -13, 2, 2);
				}

				// Backpack
				ctx.fillStyle = "#8b4a2a";
				ctx.fillRect(-10, -5, 4, 8);

				ctx.restore();
			}

			function drawScene() {
				ctx.clearRect(0, 0, W, H);
				for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) drawTile(c, r);
				drawPlayer();
			}

			// ===================== GROWTH =====================
			function updateGrowth() {
				const now = Date.now();
				let anyRipe = false;
				for (let r = 0; r < ROWS; r++)
					for (let c = 0; c < COLS; c++) {
						const p = plots[r][c];
						if (p.state >= PS.SPROUT && p.state < PS.RIPE) {
							const gt = GROW_TIME[p.state];
							if (gt > 0 && now - p.growT > gt) {
								p.state++;
								p.growT = now;
								if (p.state === PS.RIPE) anyRipe = true;
							}
						}
					}
				if (anyRipe) showToast("☕ Kopi siap dipanen! Pilih 🧺 lalu tekan E");
			}

			// ===================== PLAYER MOVEMENT =====================
			function updatePlayer() {
				if (isActing) return;
				const now = Date.now();
				if (now - lastMoveT < 150) {
					player.moving = false;
					return;
				}
				let dx = 0,
					dy = 0;
				if (keys["ArrowUp"] || keys["w"] || keys["W"]) {
					dy = -1;
					player.dir = 0;
				} else if (keys["ArrowDown"] || keys["s"] || keys["S"]) {
					dy = 1;
					player.dir = 2;
				} else if (keys["ArrowLeft"] || keys["a"] || keys["A"]) {
					dx = -1;
					player.dir = 3;
				} else if (keys["ArrowRight"] || keys["d"] || keys["D"]) {
					dx = 1;
					player.dir = 1;
				}
				if (dx || dy) {
					const nx = player.x + dx,
						ny = player.y + dy;
					if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS) {
						player.x = nx;
						player.y = ny;
					}
					player.moving = true;
					lastMoveT = now;
					updateHUD();
				} else player.moving = false;
			}

			// ===================== ACTION =====================
			function doAction() {
				if (isActing) return;
				const p = plots[player.y]?.[player.x];
				if (!p) return;
				let gifKey = null,
					msg = "";

				if (tool === "dig") {
					if (p.state === PS.EMPTY) {
						p.state = PS.DUG;
						gifKey = "digging";
						msg = "Tanah digali!";
					} else msg = "Sudah digali nih!";
				} else if (tool === "sow") {
					if (p.state === PS.DUG && seeds > 0) {
						p.state = PS.SEEDED;
						p.growT = Date.now();
						seeds--;
						gifKey = "sowing";
						msg = "Benih ditanam! 🌱";
					} else if (seeds <= 0) msg = "Benih habis! 😱";
					else msg = "Gali tanahnya dulu!";
				} else if (tool === "water") {
					if (p.state === PS.SEEDED) {
						p.state = PS.SPROUT;
						p.growT = Date.now();
						gifKey = "watering";
						msg = "Disiram! Tunggu tumbuh ya 💧";
					} else if (p.state > PS.SEEDED && p.state < PS.RIPE) {
						gifKey = "watering";
						msg = "Sedang tumbuh... 🌿";
					} else msg = "Belum ada benih!";
				} else if (tool === "harvest") {
					if (p.state === PS.RIPE) {
						p.state = PS.EMPTY;
						harvested++;
						gifKey = "harvesting";
						msg = `Panen! +1 ☕ Total: ${harvested}`;
					} else if (p.state > PS.EMPTY) msg = "Belum siap dipanen ⏳";
					else msg = "Tidak ada tanaman di sini";
				}

				showToast(msg);
				if (gifKey) playActionGif(gifKey);
				updateHUD();
			}

			function playActionGif(key) {
				isActing = true;
				const overlay = document.getElementById("action-overlay");
				const gifEl = document.getElementById("action-gif");
				const label = document.getElementById("action-label");

				// Reset GIF by re-assigning src
				gifEl.src = "";
				setTimeout(() => {
					gifEl.src = GIFS[key];
				}, 10);

				label.textContent = GIF_LABEL[key];
				overlay.classList.add("active");
				overlay.style.pointerEvents = "auto";

				setTimeout(() => {
					overlay.classList.remove("active");
					overlay.style.pointerEvents = "none";
					isActing = false;
				}, GIF_DURATION[key]);
			}

			// ===================== UI HELPERS =====================
			function setTool(t) {
				tool = t;
				["dig", "sow", "water", "harvest"].forEach((x) => document.getElementById("btn-" + x).classList.remove("active"));
				document.getElementById("btn-" + t).classList.add("active");
			}

			function updateHUD() {
				document.getElementById("h-seed").textContent = seeds;
				document.getElementById("h-harvest").textContent = harvested;
				const p = plots[player.y]?.[player.x];
				document.getElementById("h-plot").textContent = p ? PLOT_LABELS[p.state] : "—";
			}

			function showToast(msg) {
				const el = document.getElementById("toast");
				el.textContent = msg;
				el.classList.add("show");
				clearTimeout(toastTimer);
				toastTimer = setTimeout(() => el.classList.remove("show"), 2000);
			}

			function resetGame() {
				initPlots();
				seeds = 10;
				harvested = 0;
				player = { x: 6, y: 4, moving: false, dir: 2, walkFrame: 0, walkT: 0 };
				setTool("dig");
				updateHUD();
				showToast("Game direset! 🔄");
			}

			function startGame() {
				document.getElementById("intro").style.display = "none";
				showToast("Selamat datang! Gali tanah dulu lalu tanam & siram ☕");
			}

			// ===================== INPUT =====================
			document.addEventListener("keydown", (e) => {
				keys[e.key] = true;
				if (e.key === "e" || e.key === "E" || e.key === " ") {
					e.preventDefault();
					doAction();
				}
				if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) e.preventDefault();
			});
			document.addEventListener("keyup", (e) => {
				keys[e.key] = false;
			});

			canvas.addEventListener("click", (e) => {
				if (isActing) return;
				const r = canvas.getBoundingClientRect();
				const sx = W / r.width,
					sy = H / r.height;
				const mx = (e.clientX - r.left) * sx,
					my = (e.clientY - r.top) * sy;
				const tc = Math.floor(mx / TILE),
					tr = Math.floor(my / TILE);
				if (tc >= 0 && tc < COLS && tr >= 0 && tr < ROWS) {
					player.x = tc;
					player.y = tr;
					updateHUD();
					setTimeout(doAction, 60);
				}
			});

			// ===================== GAME LOOP =====================
			function gameLoop() {
				updateGrowth();
				updatePlayer();
				drawScene();
				requestAnimationFrame(gameLoop);
			}

			initPlots();
			updateHUD();
			gameLoop();
		</script>
	</body>
</html>
