<!doctype html>
<html lang="id">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1.0" />
		<title>Kopi Farm — Pixel Edition</title>
		<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			body {
				background: #1a1008;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				font-family: "Press Start 2P", monospace;
				overflow: hidden;
			}
			#wrapper {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 0;
			}

			/* ── GAME FRAME ── */
			#screen {
				position: relative;
				border: 4px solid #5a3a10;
				border-radius: 3px;
				background: #000;
				box-shadow:
					0 0 0 2px #3a2008,
					0 0 40px rgba(180, 100, 20, 0.3),
					inset 0 0 60px rgba(0, 0, 0, 0.5);
			}
			#gc {
				display: block;
				image-rendering: pixelated;
				image-rendering: crisp-edges;
			}

			/* ── HUD ── */
			#hud {
				width: 100%;
				display: flex;
				align-items: stretch;
				background: #100c04;
				border-bottom: 3px solid #3a2408;
				font-size: 8px;
			}
			.hc {
				display: flex;
				align-items: center;
				gap: 6px;
				padding: 6px 10px;
				border-right: 1px solid #2a1808;
				color: #a08040;
				white-space: nowrap;
			}
			.hc .v {
				color: #f0d060;
				font-size: 9px;
			}
			.hc .icon {
				font-size: 14px;
				line-height: 1;
			}
			#hc-weather {
				margin-left: auto;
				border-right: none;
				border-left: 1px solid #2a1808;
				flex-direction: column;
				align-items: flex-end;
				gap: 2px;
				padding: 4px 10px;
			}
			#weather-icon {
				font-size: 18px;
			}
			#weather-txt {
				font-size: 7px;
				color: #907030;
			}
			#season-txt {
				font-size: 6px;
				padding: 2px 5px;
				border-radius: 1px;
			}

			/* ── TOOLBAR ── */
			#toolbar {
				width: 100%;
				display: flex;
				background: #0c0804;
				border-top: 3px solid #3a2408;
			}
			.tb {
				flex: 1;
				padding: 8px 2px;
				border: none;
				background: transparent;
				font-family: "Press Start 2P", monospace;
				font-size: 7px;
				color: #5a4020;
				cursor: pointer;
				border-right: 1px solid #1a1008;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 3px;
				transition: all 0.1s;
				line-height: 1;
			}
			.tb:last-child {
				border-right: none;
				flex: 0.5;
			}
			.tb .ti {
				font-size: 16px;
			}
			.tb:hover {
				background: #161008;
				color: #c0a040;
			}
			.tb.on {
				background: #181208;
				color: #f0d060;
				box-shadow: inset 0 -3px 0 #e09020;
			}
			.tb.on .ti {
				filter: drop-shadow(0 0 4px #f0a020);
			}

			/* ── STATUS BAR ── */
			#statusbar {
				width: 100%;
				background: #0a0804;
				border-top: 2px solid #2a1808;
				padding: 4px 10px;
				display: flex;
				align-items: center;
				gap: 8px;
				font-size: 7px;
				color: #4a3818;
			}
			#plot-txt {
				color: #a09050;
				flex: 1;
			}
			#day-wrap {
				display: flex;
				align-items: center;
				gap: 6px;
				margin-left: auto;
			}
			#daybar {
				width: 80px;
				height: 5px;
				background: #1a1408;
				border-radius: 2px;
				overflow: hidden;
			}
			#dayfill {
				height: 100%;
				background: linear-gradient(90deg, #e06010, #f0d060);
				border-radius: 2px;
				transition: width 0.3s;
			}
			#daytime-txt {
				font-size: 7px;
				color: #706030;
				min-width: 40px;
				text-align: right;
			}
			#nextday-btn {
				font-size: 7px;
				background: #151008;
				border: 1px solid #2a1808;
				color: #6a5020;
				padding: 3px 7px;
				cursor: pointer;
				border-radius: 1px;
				font-family: "Press Start 2P", monospace;
			}
			#nextday-btn:hover {
				color: #c0a040;
				border-color: #5a4020;
			}

			/* ── SIDE PANEL ── */
			#side {
				position: absolute;
				right: -220px;
				top: 0;
				width: 216px;
				height: 100%;
				background: #0e0a04;
				border-left: 3px solid #3a2408;
				display: flex;
				flex-direction: column;
				font-size: 7px;
				transition: right 0.2s;
			}
			#side.open {
				right: 0;
			}
			#panel-tabs {
				display: flex;
				border-bottom: 2px solid #2a1808;
			}
			.ptab {
				flex: 1;
				padding: 7px 2px;
				text-align: center;
				font-size: 6px;
				cursor: pointer;
				color: #3a2810;
				border-bottom: 2px solid transparent;
			}
			.ptab.on {
				color: #f0d060;
				border-bottom-color: #e09020;
				background: #13100a;
			}
			.ptab:hover {
				color: #a08030;
			}
			#panel-body {
				flex: 1;
				overflow-y: auto;
				padding: 6px;
				scrollbar-width: thin;
				scrollbar-color: #3a2408 #0e0a04;
			}

			/* SEED CARD */
			.sc {
				border: 1px solid #2a1808;
				border-radius: 1px;
				padding: 7px;
				margin-bottom: 7px;
				cursor: pointer;
				background: #12100a;
				transition: all 0.1s;
			}
			.sc:hover {
				border-color: #6a4820;
			}
			.sc.sel {
				border-color: #f0a020;
				background: #1a1408;
			}
			.sc-name {
				font-size: 8px;
				color: #e0c050;
				margin-bottom: 3px;
			}
			.sc-desc {
				font-size: 6px;
				color: #5a4820;
				line-height: 1.6;
				margin-bottom: 4px;
			}
			.sc-row {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-top: 5px;
			}
			.sc-price {
				font-size: 7px;
				color: #60d060;
			}
			.buy-btn {
				font-size: 6px;
				background: #102a08;
				border: 1px solid #308018;
				color: #70d030;
				padding: 3px 7px;
				cursor: pointer;
				border-radius: 1px;
				font-family: "Press Start 2P", monospace;
			}
			.buy-btn:hover {
				background: #1a3a10;
			}
			.statbar {
				height: 4px;
				background: #1a1408;
				border-radius: 1px;
				margin-top: 2px;
				overflow: hidden;
			}
			.statfill {
				height: 100%;
				border-radius: 1px;
			}

			/* NPC */
			.nc {
				border: 1px solid #2a1808;
				border-radius: 1px;
				padding: 7px;
				margin-bottom: 8px;
				background: #12100a;
			}
			.nc-head {
				display: flex;
				align-items: center;
				gap: 6px;
				margin-bottom: 4px;
			}
			.nc-av {
				font-size: 18px;
				line-height: 1;
			}
			.nc-name {
				font-size: 8px;
				color: #d0b040;
			}
			.nc-role {
				font-size: 6px;
				color: #5a4820;
				margin-top: 2px;
			}
			.nc-desc {
				font-size: 6px;
				color: #4a3818;
				line-height: 1.6;
				margin-bottom: 5px;
			}
			.nc-row {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 3px 0;
				border-top: 1px solid #1a1008;
			}
			.nc-cn {
				font-size: 6px;
				color: #b09040;
			}
			.nc-pr {
				font-size: 7px;
				color: #60d060;
			}
			.sell-btn {
				font-size: 6px;
				background: #0a2008;
				border: 1px solid #206010;
				color: #60c030;
				padding: 2px 6px;
				cursor: pointer;
				border-radius: 1px;
				font-family: "Press Start 2P", monospace;
			}
			.sell-btn:hover {
				background: #142808;
			}
			.sell-btn:disabled {
				opacity: 0.35;
				cursor: not-allowed;
			}

			/* INV */
			.ir {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 5px 0;
				border-bottom: 1px solid #1a1008;
				font-size: 7px;
			}
			.ir-name {
				color: #c0a040;
			}
			.ir-qty {
				font-size: 9px;
				color: #f0d060;
			}

			/* TOAST */
			#toast {
				position: absolute;
				top: 44px;
				left: 50%;
				transform: translateX(-50%);
				background: #0e0a02ee;
				border: 2px solid #7a5818;
				color: #f0d060;
				padding: 5px 14px;
				border-radius: 2px;
				font-size: 7px;
				white-space: nowrap;
				pointer-events: none;
				opacity: 0;
				transition: opacity 0.2s;
				z-index: 20;
				max-width: 90%;
				text-align: center;
			}
			#toast.show {
				opacity: 1;
			}

			/* PANEL TOGGLE */
			#panel-toggle {
				position: absolute;
				right: 0;
				top: 50%;
				transform: translateY(-50%);
				background: #0e0a04;
				border: 2px solid #3a2408;
				border-right: none;
				padding: 8px 4px;
				cursor: pointer;
				font-size: 8px;
				color: #6a5020;
				border-radius: 2px 0 0 2px;
				z-index: 5;
				writing-mode: vertical-rl;
			}
			#panel-toggle:hover {
				color: #c0a040;
			}

			/* INTRO */
			#intro {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: #000;
				z-index: 30;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 20px;
			}
			#intro-canvas {
				image-rendering: pixelated;
				border: 2px solid #3a2408;
			}
			.intro-title {
				font-size: 14px;
				color: #f0d060;
				text-shadow:
					0 0 20px #e08010,
					2px 2px #6a3000;
				text-align: center;
				line-height: 2;
			}
			.intro-sub {
				font-size: 7px;
				color: #7a5820;
				text-align: center;
				line-height: 2;
			}
			#start-btn {
				font-size: 8px;
				background: #102808;
				color: #70e030;
				border: 2px solid #40a018;
				padding: 12px 24px;
				cursor: pointer;
				font-family: "Press Start 2P", monospace;
				border-radius: 2px;
				animation: blink 1s step-end infinite;
			}
			@keyframes blink {
				0%,
				100% {
					opacity: 1;
				}
				50% {
					opacity: 0.3;
				}
			}
		</style>
	</head>
	<body>
		<div id="wrapper">
			<div id="screen" style="position: relative">
				<!-- INTRO -->
				<div id="intro">
					<canvas id="intro-canvas" width="320" height="240"></canvas>
					<div class="intro-title">☕ KOPI FARM</div>
					<div class="intro-sub">Pixel Edition · Sengoku Adventure<br />Tanam · Rawat · Panen · Jual</div>
					<button id="start-btn" onclick="startGame()">▶ MULAI BERTANI</button>
				</div>

				<!-- HUD -->
				<div id="hud">
					<div class="hc"><span class="icon">💰</span><span class="v" id="h-gold">500</span><span>rp</span></div>
					<div class="hc"><span class="icon" id="h-seed-icon">🌱</span><span class="v" id="h-seed-qty">5</span></div>
					<div class="hc"><span class="icon">☕</span><span class="v" id="h-inv">0</span></div>
					<div class="hc"><span class="icon">📅</span>Hari <span class="v" id="h-day">1</span></div>
					<div class="hc" id="hc-weather">
						<div id="weather-icon">🌤</div>
						<div id="weather-txt">Cerah</div>
						<div id="season-txt">Hujan</div>
					</div>
				</div>

				<!-- GAME CANVAS -->
				<canvas id="gc" width="640" height="400"></canvas>

				<!-- TOAST -->
				<div id="toast"></div>

				<!-- PANEL TOGGLE -->
				<div id="panel-toggle" onclick="togglePanel()">PANEL ▸</div>

				<!-- SIDE PANEL -->
				<div id="side">
					<div id="panel-tabs">
						<div class="ptab on" id="pt-shop" onclick="switchTab('shop')">🛒 Benih</div>
						<div class="ptab" id="pt-market" onclick="switchTab('market')">🏪 Pasar</div>
						<div class="ptab" id="pt-inv" onclick="switchTab('inv')">🎒 Tas</div>
					</div>
					<div id="panel-body"></div>
				</div>

				<!-- TOOLBAR -->
				<div id="toolbar">
					<button class="tb on" id="btn-dig" onclick="setTool('dig')"><span class="ti">⛏</span>GALI</button>
					<button class="tb" id="btn-sow" onclick="setTool('sow')"><span class="ti">🌱</span>TANAM</button>
					<button class="tb" id="btn-water" onclick="setTool('water')"><span class="ti">💧</span>SIRAM</button>
					<button class="tb" id="btn-harvest" onclick="setTool('harvest')"><span class="ti">🧺</span>PANEN</button>
					<button class="tb" id="btn-reset" onclick="if (confirm('Reset?')) resetGame();" style="flex: 0.4"><span class="ti" style="font-size: 12px">↺</span></button>
				</div>

				<!-- STATUS BAR -->
				<div id="statusbar">
					<span id="plot-txt">—</span>
					<div id="day-wrap">
						<div id="daybar"><div id="dayfill" style="width: 0%"></div></div>
						<span id="daytime-txt">Pagi</span>
						<button id="nextday-btn" onclick="advanceDay()">⏭ Skip</button>
					</div>
				</div>
			</div>
		</div>

		<script>
			"use strict";
			// ════════════════════════════════════════════════════════
			//  PIXEL ART RENDERER — 32×32 character sprites drawn
			//  entirely on canvas. No images, no GIFs.
			// ════════════════════════════════════════════════════════

			// ── CANVAS SETUP ──────────────────────────────────────
			const gc = document.getElementById("gc");
			const ctx = gc.getContext("2d");
			ctx.imageSmoothingEnabled = false;
			const CW = 640,
				CH = 400,
				TILE = 40;
			const COLS = Math.floor(CW / TILE),
				ROWS = Math.floor(CH / TILE);

			// ── PIXEL ART HELPER ─────────────────────────────────
			// Draw a pixel-art sprite defined as a palette + indexed rows
			function drawSprite(cx, cy, palette, rows, scale = 1) {
				const W = rows[0].length,
					H = rows.length;
				const ox = cx - Math.floor((W * scale) / 2),
					oy = cy - Math.floor((H * scale) / 2);
				for (let r = 0; r < H; r++) {
					for (let c = 0; c < W; c++) {
						const ch = rows[r][c];
						if (ch === "." || ch === " ") continue;
						ctx.fillStyle = palette[ch];
						ctx.fillRect(ox + c * scale, oy + r * scale, scale, scale);
					}
				}
			}

			// ── CHARACTER PALETTE ─────────────────────────────────
			const PAL = {
				// skin
				S: "#f0b87a",
				s: "#d49060",
				K: "#c07040",
				// hair
				H: "#8b4513",
				h: "#6b3010",
				// shirt (blue)
				B: "#3a7ac8",
				b: "#2a5a9a",
				// pants (brown)
				P: "#7a4a20",
				p: "#5a3010",
				// shoes
				X: "#2a1808",
				// eyes
				E: "#1a1010",
				// tool colors
				T: "#c0c0c0",
				t: "#909090", // shovel metal
				G: "#c8a040",
				g: "#a08030", // watering can gold
				W: "#4090d0",
				w: "#2060a0", // water
				// hat band
				F: "#3a6010",
				// basket
				Y: "#c07820",
				y: "#a05010",
				// particles
				D: "#8b5a30", // dirt
			};

			// ── FRAME DEFINITIONS ─────────────────────────────────
			// Each animation is an array of frames (arrays of rows)
			// Characters: see PAL above. '.' = transparent

			// IDLE facing down (2 frames: normal, breathe)
			const IDLE_DOWN = [
				["....HHHHHH.....", "...HhhhhhHH....", "..HhSSSSShH....", "..HhSSESSh.....", "..HhSSSSSh.....", "...hSSsSS......", "..BBBBBBBBb....", "..BbBBBBBbb....", "..bBBBBBBbb....", "..bBPPPPbBb....", "...bPPPPbb.....", "..ppPPPPpp.....", "..ppPpPppp.....", "..XppXppXX.....", "..XXppXXXX....."],
				["....HHHHHH.....", "...HhhhhhHH....", "..HhSSSSShH....", "..HhSSESSh.....", "..HhSsSsSh.....", "...hSSsSS......", "...BBBBBBBb....", "..BbBBBBBbb....", "..bBBBBBBbb....", "..bBPPPPbBb....", "...bPPPPbb.....", "..ppPPPPpp.....", "..ppPpPppp.....", "..XppXppXX.....", "..XXppXXXX....."],
			];

			// WALK DOWN (4 frames)
			const WALK_DOWN = [
				[
					// frame 0
					"....HHHHHH.....",
					"...HhhhhhHH....",
					"..HhSSSSShH....",
					"..HhSSESSh.....",
					"..HhSSSSSh.....",
					"...hSSsSS......",
					"..BBBBBBBBb....",
					"..BbBBBBBbb....",
					"..bBBBBBBbb....",
					"..bBPPPPbBb....",
					"...bPPPPbb.....",
					"....PPPPp......",
					"...ppPPppp.....",
					"...pXppXpp.....",
					"...XXppXXp.....",
				],
				[
					// frame 1 - left leg forward
					"....HHHHHH.....",
					"...HhhhhhHH....",
					"..HhSSSSShH....",
					"..HhSSESSh.....",
					"..HhSSSSSh.....",
					"...hSSsSS......",
					"..BBBBBBBBb....",
					"..BbBBBBBbb....",
					"..bBBBBBBbb....",
					"...bBPPPPbB....",
					"...ppPPPPpp....",
					"...pppPPPpp....",
					"...ppppPPpp....",
					"....pXpXpp.....",
					"....XXpXXp.....",
				],
				[
					// frame 2 - mid
					"....HHHHHH.....",
					"...HhhhhhHH....",
					"..HhSSSSShH....",
					"..HhSSESSh.....",
					"..HhSSSSSh.....",
					"...hSSsSS......",
					"..BBBBBBBBb....",
					"..BbBBBBBbb....",
					"..bBBBBBBbb....",
					"..bBPPPPbBb....",
					"...bPPPPbb.....",
					"....PPPPp......",
					"...ppPPppp.....",
					"...pXppXpp.....",
					"...XXppXXp.....",
				],
				[
					// frame 3 - right leg forward
					"....HHHHHH.....",
					"...HhhhhhHH....",
					"..HhSSSSShH....",
					"..HhSSESSh.....",
					"..HhSSSSSh.....",
					"...hSSsSS......",
					"..BBBBBBBBb....",
					"..BbBBBBBbb....",
					"..bBBBBBBbb....",
					"...bBPPPPbB....",
					"...ppPPPPpp....",
					"....pppPPpp....",
					"....ppppPPp....",
					"....pXpXpp.....",
					"....pXpXXX.....",
				],
			];

			// WALK UP (4 frames — back of character)
			const WALK_UP = [

			let particles = [];

			function spawnParticles(cx, cy, type) {
				const configs = {
					dirt: { count: 14, colors: ["#8b5a30", "#6b3a18", "#c08040", "#a06020", "#d0a060"], vx: [-2.5, 2.5], vy: [-4, -0.5], size: [2, 5], life: [20, 35], gravity: 0.25 },
					water: { count: 18, colors: ["#4090d0", "#60b0f0", "#2060a0", "#80c0ff", "#a0d8ff"], vx: [-3, 3], vy: [-5, -1], size: [2, 4], life: [18, 28], gravity: 0.3 },
					seed: { count: 8, colors: ["#c8a040", "#e0c060", "#a08020"], vx: [-1.5, 1.5], vy: [-3, -0.5], size: [2, 3], life: [15, 25], gravity: 0.2 },
					sparkle: { count: 12, colors: ["#f0e060", "#ffd700", "#fff080", "#ffb020"], vx: [-2, 2], vy: [-4, -1], size: [2, 4], life: [20, 30], gravity: 0.15 },
					leaf: { count: 10, colors: ["#60a820", "#80c030", "#40801a", "#a0d050"], vx: [-2, 2], vy: [-3, -0.5], size: [2, 4], life: [25, 40], gravity: 0.1 },
				};
				const c = configs[type];
				if (!c) return;
				for (let i = 0; i < c.count; i++) {
					const angle = Math.random() * Math.PI * 2;
					particles.push({
						x: cx + (Math.random() - 0.5) * 10,
						y: cy + (Math.random() - 0.5) * 6,
						vx: c.vx[0] + Math.random() * (c.vx[1] - c.vx[0]),
						vy: c.vy[0] + Math.random() * (c.vy[1] - c.vy[0]),
						size: c.size[0] + Math.random() * (c.size[1] - c.size[0]),
						life: c.life[0] + Math.random() * (c.life[1] - c.life[0]),
						maxLife: 0,
						gravity: c.gravity,
						color: c.colors[Math.floor(Math.random() * c.colors.length)],
						alpha: 1,
						spin: (Math.random() - 0.5) * 0.3,
					});
					particles[particles.length - 1].maxLife = particles[particles.length - 1].life;
				}
			}

			function updateParticles() {
				particles = particles.filter((p) => {
					p.x += p.vx;
					p.y += p.vy;
					p.vy += p.gravity;
					p.vx *= 0.96;
					p.life--;
					p.alpha = p.life / p.maxLife;
					return p.life > 0;
				});
			}

			function drawParticles() {
				particles.forEach((p) => {
					ctx.save();
					ctx.globalAlpha = p.alpha;
					ctx.fillStyle = p.color;
					const sz = Math.max(1, Math.floor(p.size * p.alpha));
					// pixelated: snap to grid
					ctx.fillRect(Math.round(p.x), Math.round(p.y), sz, sz);
					ctx.restore();
				});
			}

					x: 6,
					y: 4,
					dir: "down",
					anim: "idle_down",
					frame: 0,
					frameTimer: 0,
					isActing: false,
					actingTimer: 0,
					moving: false,
				};
			let keys = {},
				lastMoveT = 0,
				toastTimer = null,
				activeTab = "shop",
				panelOpen = false;
			let dayT = Date.now();

			function initPlots() {
				plots = Array.from({ length: ROWS }, () => Array.from({ length: COLS }, () => ({ state: PS.EMPTY, coffeeType: null, growT: 0, weatherHistory: [] })));
			}

			// ── ANIM CONTROLLER ────────────────────────────────────
			const SPRITE_SCALE = 2; // 2px per pixel → 30px char height

			function setAnim(name) {
				if (player.anim === name) return;
				player.anim = name;
				player.frame = 0;
				player.frameTimer = 0;
			}

			function stepAnim(dt) {
				const a = ANIMS[player.anim];
				if (!a) return;
				player.frameTimer += dt;
				const frameDur = 1000 / a.fps;
				if (player.frameTimer >= frameDur) {
					player.frameTimer -= frameDur;
					if (player.frame < a.frames.length - 1) {
						player.frame++;
					} else if (a.loop) {
						player.frame = 0;
					} else {
						// action finished
						player.isActing = false;
						player.frame = a.frames.length - 1;
						setAnim("idle_down");
					}
				}
			}

			// ── TILE DRAWING ───────────────────────────────────────
			function drawTile(c, r) {
				const x = c * TILE,
					y = r * TILE,
					p = plots[r][c];
				const cx = x + TILE / 2,
					cy = y + TILE / 2,
					now = Date.now();
				const even = (c + r) % 2 === 0;

				// Base ground
				if (p.state === PS.EMPTY) {
					ctx.fillStyle = even ? "#3a6a1a" : "#2d5512";
					ctx.fillRect(x, y, TILE, TILE);
					// Grass tufts (pixel art style)
					ctx.fillStyle = "rgba(80,160,30,0.35)";
					ctx.fillRect(x + 3, y + 4, 2, 4);
					ctx.fillRect(x + 3, y + 3, 4, 2);
					ctx.fillRect(x + 12, y + 8, 2, 5);
					ctx.fillRect(x + 12, y + 7, 4, 2);
					ctx.fillRect(x + 26, y + 5, 2, 4);
					ctx.fillRect(x + 26, y + 4, 4, 2);
					ctx.fillStyle = "rgba(40,120,10,0.2)";
					ctx.fillRect(x + 7, y + 18, 2, 6);
					ctx.fillRect(x + 7, y + 17, 4, 2);
					ctx.fillRect(x + 32, y + 22, 2, 5);
					ctx.fillRect(x + 32, y + 21, 4, 2);
				} else {
					ctx.fillStyle = p.state === PS.DUG ? "#3d2010" : "#5a3818";
					ctx.fillRect(x, y, TILE, TILE);
					// Soil texture (pixel clumps)
					ctx.fillStyle = "rgba(0,0,0,0.12)";
					for (let i = 0; i < 3; i++) for (let j = 0; j < 2; j++) ctx.fillRect(x + 4 + i * 13, y + 5 + j * 16, 9, 5);
					if (p.coffeeType) {
						ctx.fillStyle = COFFEE[p.coffeeType].color + "33";
						ctx.fillRect(x + 1, y + 1, TILE - 2, 5);
					}
				}

				// Grid line
				ctx.strokeStyle = "rgba(0,0,0,0.14)";
				ctx.lineWidth = 1;
				ctx.strokeRect(x, y, TILE, TILE);

				// Player tile highlight
				if (c === player.x && r === player.y) {
					ctx.strokeStyle = "rgba(255,235,80,0.8)";
					ctx.lineWidth = 2;
					ctx.strokeRect(x + 1, y + 1, TILE - 2, TILE - 2);
					ctx.fillStyle = "rgba(255,235,80,0.06)";
					ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
				}

				drawPlant(p, cx, cy, now);
			}

			function drawPlant(p, cx, cy, now) {
				if (p.state < PS.SEEDED || !p.coffeeType) return;
				const cc = COFFEE[p.coffeeType].color;
				const pulse = 0.5 + 0.5 * Math.sin(now / 400);

				if (p.state === PS.SEEDED) {
					// Pixel seed
					ctx.fillStyle = "#c8a040";
					ctx.fillRect(cx - 2, cy + 2, 4, 4);
					ctx.fillStyle = "#e8c060";
					ctx.fillRect(cx - 1, cy + 2, 2, 2);
				}
				if (p.state === PS.SPROUT) {
					ctx.fillStyle = "#7b4226";
					ctx.fillRect(cx - 1, cy + 4, 2, 10);
					ctx.fillStyle = cc;
					// Left leaf
					ctx.fillRect(cx - 7, cy + 2, 6, 2);
					ctx.fillRect(cx - 6, cy, 4, 2);
					ctx.fillRect(cx - 5, cy - 2, 2, 2);
					// Right leaf
					ctx.fillRect(cx + 1, cy + 1, 6, 2);
					ctx.fillRect(cx + 2, cy - 1, 4, 2);
					ctx.fillRect(cx + 3, cy - 3, 2, 2);
				}
				if (p.state === PS.YOUNG) {
					// Trunk
					ctx.fillStyle = "#7b4226";
					ctx.fillRect(cx - 2, cy + 2, 4, 14);
					ctx.fillStyle = "#5a3010";
					ctx.fillRect(cx - 1, cy + 3, 1, 13);
					// Canopy pixel art
					ctx.fillStyle = cc + "bb";
					ctx.fillRect(cx - 10, cy - 4, 20, 12);
					ctx.fillStyle = cc;
					ctx.fillRect(cx - 8, cy - 8, 16, 6);
					ctx.fillRect(cx - 6, cy - 10, 12, 4);
					ctx.fillRect(cx - 4, cy - 12, 8, 4);
					// Highlights
					ctx.fillStyle = cc + "ff";
					ctx.fillRect(cx - 7, cy - 7, 4, 4);
					ctx.fillRect(cx + 2, cy - 9, 3, 3);
				}
				if (p.state === PS.MATURE) {
					ctx.fillStyle = "#7b4226";
					ctx.fillRect(cx - 3, cy + 4, 6, 16);
					ctx.fillStyle = "#5a3010";
					ctx.fillRect(cx - 2, cy + 5, 2, 15);
					// Big canopy
					ctx.fillStyle = cc + "88";
					ctx.fillRect(cx - 14, cy - 8, 28, 16);
					ctx.fillStyle = cc + "bb";
					ctx.fillRect(cx - 12, cy - 12, 24, 8);
					ctx.fillRect(cx - 10, cy - 14, 20, 4);
					ctx.fillStyle = cc;
					ctx.fillRect(cx - 8, cy - 16, 16, 4);
					ctx.fillRect(cx - 6, cy - 18, 12, 4);
					ctx.fillStyle = cc + "ff";
					ctx.fillRect(cx - 10, cy - 10, 5, 5);
					ctx.fillRect(cx + 4, cy - 12, 4, 4);
				}
				if (p.state === PS.RIPE) {
					// Full tree
					ctx.fillStyle = "#7b4226";
					ctx.fillRect(cx - 3, cy + 4, 6, 16);
					ctx.fillStyle = "#5a3010";
					ctx.fillRect(cx - 2, cy + 5, 2, 15);
					ctx.fillStyle = cc + "77";
					ctx.fillRect(cx - 14, cy - 8, 28, 16);
					ctx.fillStyle = cc + "aa";
					ctx.fillRect(cx - 12, cy - 12, 24, 8);
					ctx.fillRect(cx - 10, cy - 14, 20, 4);
					ctx.fillStyle = cc + "dd";
					ctx.fillRect(cx - 8, cy - 16, 16, 4);
					ctx.fillRect(cx - 6, cy - 18, 12, 4);
					// Coffee cherries (red pixel berries)
					const berries = [
						[-8, -6],
						[0, -8],
						[6, -5],
						[-5, -2],
						[4, -3],
						[-2, -14],
						[7, -10],
						[-10, -10],
					];
					berries.forEach(([bx, by]) => {
						ctx.fillStyle = "#c01010";
						ctx.fillRect(cx + bx - 1, cy + by - 1, 4, 4);
						ctx.fillStyle = "#e03020";
						ctx.fillRect(cx + bx, cy + by - 1, 2, 2);
						ctx.fillStyle = "#ff6050";
						ctx.fillRect(cx + bx, cy + by - 1, 1, 1);
					});
					// Pulse ! indicator
					ctx.fillStyle = `rgba(255,220,30,${pulse})`;
					ctx.fillRect(cx - 1, cy - 26, 2, 6);
					ctx.fillRect(cx - 1, cy - 18, 2, 2);
					// Stars sparkle
					if (Math.floor(now / 300) % 2 === 0) {
						ctx.fillStyle = "#ffe060";
						ctx.fillRect(cx - 14, cy - 14, 2, 2);
						ctx.fillRect(cx + 12, cy - 10, 2, 2);
						ctx.fillRect(cx - 4, cy - 22, 2, 2);
					}
				}
			}

			// ── CHARACTER RENDERER ─────────────────────────────────
			function drawCharacter(px, py) {
				const a = ANIMS[player.anim];
				if (!a) return;
				const frame = a.frames[Math.min(player.frame, a.frames.length - 1)];
				if (!frame) return;

				// Shadow
				ctx.save();
				ctx.globalAlpha = 0.25;
				ctx.fillStyle = "#000";
				ctx.beginPath();
				ctx.ellipse(px, py + 14, 12, 4, 0, 0, Math.PI * 2);
				ctx.fill();
				ctx.restore();

				// Bob effect
				const now = Date.now();
				const bob = player.moving && !player.isActing ? Math.sin(now / 100) * 1.5 : 0;

				ctx.save();
				if (player.anim === "walk_left") {
					ctx.scale(-1, 1);
					ctx.translate(-px * 2, 0);
				}

				// Draw sprite pixel by pixel using scale
				const SC = SPRITE_SCALE;
				const rows = frame;
				const W = rows[0].length,
					H = rows.length;
				const ox = px - Math.floor((W * SC) / 2),
					oy = py - Math.floor((H * SC) / 2) + Math.round(bob);

				for (let r = 0; r < H; r++) {
					for (let c = 0; c < W; c++) {
						const ch = rows[r][c];
						if (ch === "." || ch === " ") continue;
						const col = PAL[ch];
						if (!col) continue;
						ctx.fillStyle = col;
						ctx.fillRect(ox + c * SC, oy + r * SC, SC, SC);
					}
				}
				ctx.restore();
			}

			// ── WEATHER & SEASON ───────────────────────────────────
			function getSeason() {
				return SEASONS[G.seasonIdx];
			}
			function rollWeather() {
				const pool = WEATHER_POOL[getSeason().id];
				let r = Math.random(),
					cum = 0;
				for (const w of pool) {
					cum += w.prob;
					if (r < cum) return w;
				}
				return pool[0];
			}
			function getGrowMod(coffeeId) {
				const c = COFFEE[coffeeId];
				return (c.weatherBonus[G.weather.id] || 1) * (c.seasonBonus[getSeason().id] || 1);
			}

			function advanceDay() {
				G.day++;
				dayT = Date.now();
				if ((G.day - 1) % 7 === 0) G.seasonIdx = (G.seasonIdx + 1) % SEASONS.length;
				G.weather = rollWeather();
				for (let r = 0; r < ROWS; r++)
					for (let c = 0; c < COLS; c++) {
						const p = plots[r][c];
						if (p.state >= PS.SPROUT && p.state < PS.RIPE && p.coffeeType) p.weatherHistory.push(getGrowMod(p.coffeeType));
					}
				updateWeatherUI();
				updateHUD();
				refreshPanel();
				showToast(`📅 Hari ${G.day} — ${getSeason().name} ${G.weather.icon} ${G.weather.name}`);
			}

			let dayFrac = 0;
			function updateDayBar() {
				dayFrac = Math.min((Date.now() - dayT) / 90000, 1);
				document.getElementById("dayfill").style.width = dayFrac * 100 + "%";
				const labels = ["Dini Hari", "Subuh", "Pagi", "Siang", "Sore", "Malam"];
				document.getElementById("daytime-txt").textContent = labels[Math.min(Math.floor(dayFrac * 6), 5)];
				if (dayFrac >= 1) {
					advanceDay();
				}
			}

			function updateWeatherUI() {
				const s = getSeason(),
					w = G.weather;
				document.getElementById("weather-icon").textContent = w.icon;
				document.getElementById("weather-txt").textContent = w.name;
				const sb = document.getElementById("season-txt");
				sb.textContent = s.badge + " " + s.name;
				sb.style = s.badgeStyle;
				document.getElementById("h-day").textContent = G.day;
			}

			// ── GROWTH ─────────────────────────────────────────────
			function updateGrowth() {
				const now = Date.now();
				let anyRipe = false;
				for (let r = 0; r < ROWS; r++)
					for (let c = 0; c < COLS; c++) {
						const p = plots[r][c];
						if (p.state < PS.SPROUT || p.state >= PS.RIPE || !p.coffeeType) continue;
						const base = COFFEE[p.coffeeType].growTime[p.state];
						const eff = base / getGrowMod(p.coffeeType);
						if (now - p.growT > eff) {
							p.state++;
							p.growT = now;
							if (p.state === PS.RIPE) anyRipe = true;
						}
					}
				if (anyRipe) showToast("☕ Kopi siap dipanen!");
			}

			// ── ACTION SYSTEM ──────────────────────────────────────
			function doAction() {
				if (player.isActing) return;
				const p = plots[player.y]?.[player.x];
				if (!p) return;
				const px = player.x * TILE + TILE / 2,
					py = player.y * TILE + TILE / 2;
				let msg = "",
					ok = false;

				if (G.tool === "dig") {
					if (p.state === PS.EMPTY) {
						p.state = PS.DUG;
						msg = "⛏ Tanah digali!";
						ok = true;
						setAnim("dig");
						player.isActing = true;
						spawnParticles(px, py + 10, "dirt");
						setTimeout(() => spawnParticles(px - 8, py + 14, "dirt"), 200);
						setTimeout(() => spawnParticles(px + 6, py + 16, "dirt"), 350);
					} else msg = "Sudah digali.";
				} else if (G.tool === "sow") {
					const sid = G.selectedSeed;
					if (p.state !== PS.DUG) msg = "Gali dulu!";
					else if (!G.seedStock[sid] || G.seedStock[sid] <= 0) msg = `Benih ${COFFEE[sid].name} habis!`;
					else {
						p.state = PS.SEEDED;
						p.coffeeType = sid;
						p.growT = Date.now();
						p.weatherHistory = [];
						G.seedStock[sid]--;
						ok = true;
						msg = `🌱 ${COFFEE[sid].emoji} ${COFFEE[sid].name} ditanam!`;
						setAnim("sow");
						player.isActing = true;
						spawnParticles(px + 12, py + 8, "seed");
					}
				} else if (G.tool === "water") {
					if (p.state === PS.SEEDED) {
						p.state = PS.SPROUT;
						p.growT = Date.now();
						p.weatherHistory.push(getGrowMod(p.coffeeType));
						ok = true;
						const mod = getGrowMod(p.coffeeType);
						msg = `💧 Disiram! Bonus: ${mod > 1 ? "+" : ""}${Math.round((mod - 1) * 100)}%`;
						setAnim("water");
						player.isActing = true;
						setTimeout(() => spawnParticles(px + 8, py + 12, "water"), 600);
						setTimeout(() => spawnParticles(px + 6, py + 14, "water"), 900);
						setTimeout(() => spawnParticles(px + 10, py + 10, "water"), 1100);
					} else if (p.state >= PS.SPROUT && p.state < PS.RIPE) {
						p.weatherHistory.push(getGrowMod(p.coffeeType));
						ok = true;
						msg = "💧 Disiram!";
						setAnim("water");
						player.isActing = true;
						setTimeout(() => spawnParticles(px + 8, py + 12, "water"), 600);
						setTimeout(() => spawnParticles(px + 6, py + 14, "water"), 900);
					} else msg = "Tidak ada tanaman.";
				} else if (G.tool === "harvest") {
					if (p.state === PS.RIPE) {
						const ct = p.coffeeType;
						G.inventory[ct] = (G.inventory[ct] || 0) + 1;
						const wh = p.weatherHistory;
						const q = wh.length ? wh.reduce((a, b) => a + b, 0) / wh.length : 1;
						const ql = q > 1.5 ? "Istimewa★★★" : q > 1.2 ? "Premium★★" : q > 0.8 ? "Baik★" : "Biasa";
						p.state = PS.EMPTY;
						p.coffeeType = null;
						p.weatherHistory = [];
						ok = true;
						msg = `🧺 Panen ${COFFEE[ct].emoji} [${ql}]! +1`;
						setAnim("harvest");
						player.isActing = true;
						spawnParticles(px, py, "sparkle");
						setTimeout(() => spawnParticles(px - 6, py - 4, "leaf"), 300);
						setTimeout(() => spawnParticles(px + 6, py - 6, "sparkle"), 500);
					} else if (p.state > PS.EMPTY) msg = "Belum siap ⏳";
					else msg = "Tidak ada tanaman.";
				}

				if (ok) updateHUD();
				refreshPanel();
				showToast(msg);
			}

			// ── MARKET / SHOP ──────────────────────────────────────
			function calcPrice(coffeeId, npc) {
				const base = COFFEE[coffeeId].basePrice;
				const npcMod = npc.wants[coffeeId] || 0.5;
				const wMod = getGrowMod(coffeeId);
				const bonus = npc.bonusCondition(getSeason().id) || npc.bonusCondition(G.weather.id) ? 1.3 : 1;
				return Math.round(base * npcMod * wMod * bonus);
			}
			function buySeed(id) {
				const cost = COFFEE[id].seedCost;
				if (G.gold < cost) {
					showToast("💰 Uang kurang!");
					return;
				}
				G.gold -= cost;
				G.seedStock[id] = (G.seedStock[id] || 0) + 3;
				showToast(`🛒 Beli 3× ${COFFEE[id].name} — -${cost}rp`);
				updateHUD();
				refreshPanel();
			}
			function sellCoffee(id, npcId) {
				const npc = NPC_TEMPLATES.find((n) => n.id === npcId);
				if (!npc) return;
				if (!G.inventory[id] || G.inventory[id] <= 0) {
					showToast("Tidak ada kopi!");
					return;
				}
				const price = calcPrice(id, npc);
				G.gold += price;
				G.inventory[id]--;
				showToast(`💰 Jual ${COFFEE[id].emoji} → ${npc.name}: +${price}rp`);
				updateHUD();
				refreshPanel();
			}

			// ── PANEL RENDERING ────────────────────────────────────
			function switchTab(t) {
				activeTab = t;
				["shop", "market", "inv"].forEach((x) => {
					document.getElementById("pt-" + x).classList.toggle("on", x === t);
				});
				refreshPanel();
			}
			function togglePanel() {
				panelOpen = !panelOpen;
				document.getElementById("side").classList.toggle("open", panelOpen);
			}

			function qBar(val, max, col) {
				const p = Math.round(Math.min(val / max, 1) * 100);
				return `<div class="statbar"><div class="statfill" style="width:${p}%;background:${col}"></div></div>`;
			}
			function refreshPanel() {
				const el = document.getElementById("panel-body");
				if (activeTab === "shop") {
					let h = `<div style="font-size:6px;color:#4a3818;margin-bottom:6px;line-height:1.7">💰 <b style="color:#f0d060">${G.gold}rp</b> &nbsp;|&nbsp; ${G.weather.icon} ${G.weather.name}</div>`;
					for (const [id, c] of Object.entries(COFFEE)) {
						const mod = getGrowMod(id);
						const mt = mod > 1.1 ? `<span style="color:#60d060">▲${Math.round((mod - 1) * 100)}%</span>` : mod < 0.9 ? `<span style="color:#e06040">▼${Math.round((1 - mod) * 100)}%</span>` : '<span style="color:#707050">±0%</span>';
						const sel = G.selectedSeed === id;
						const stk = G.seedStock[id] || 0;
						h += `<div class="sc${sel ? " sel" : ""}" onclick="G.selectedSeed='${id}';refreshPanel();updateHUD()">
        <div class="sc-name">${c.emoji} ${c.name}</div>
        <div class="sc-desc">${c.desc}</div>
        <div class="sc-desc">Stok: <b style="color:#f0d060">${stk}</b> &nbsp; Cuaca: ${mt}</div>
        ${qBar(c.basePrice, 400, c.barColor)}
        ${qBar(1 - c.seedCost / 200, 1, c.barColor)}
        <div style="font-size:5px;color:#3a2810;margin-top:1px">Harga jual │ Keterjangkauan</div>
        <div class="sc-row">
          <div class="sc-price">${c.seedCost}rp/3biji</div>
          <button class="buy-btn" onclick="event.stopPropagation();buySeed('${id}')">Beli</button>
        </div>
      </div>`;
					}
					el.innerHTML = h;
				} else if (activeTab === "market") {
					let h = `<div style="font-size:6px;color:#4a3818;margin-bottom:6px;line-height:1.7">${getSeason().badge} ${getSeason().name}<br>${G.weather.icon} ${G.weather.name}</div>`;
					for (const npc of NPC_TEMPLATES) {
						h += `<div class="nc">
        <div class="nc-head"><span class="nc-av">${npc.avatar}</span><div><div class="nc-name">${npc.name}</div><div class="nc-role">${npc.role}</div></div></div>
        <div class="nc-desc">${npc.desc}<br><span style="color:#607030">${npc.bonusDesc}</span></div>`;
						for (const [cid, c] of Object.entries(COFFEE)) {
							const pr = calcPrice(cid, npc),
								stk = G.inventory[cid] || 0;
							const interest = npc.wants[cid] > 1.2 ? "🔥" : npc.wants[cid] > 0.9 ? "✅" : "➖";
							h += `<div class="nc-row">
          <span class="nc-cn">${c.emoji}${c.name}${interest}</span>
          <div style="display:flex;align-items:center;gap:4px">
            <span class="nc-pr">${pr}rp</span>
            <button class="sell-btn" ${stk <= 0 ? "disabled" : ""} onclick="sellCoffee('${cid}','${npc.id}')">Jual${stk > 0 ? `(${stk})` : ""}</button>
          </div>
        </div>`;
						}
						h += `</div>`;
					}
					el.innerHTML = h;
				} else {
					const total = Object.values(G.inventory).reduce((a, b) => a + b, 0);
					let h = `<div style="font-size:6px;color:#4a3818;margin-bottom:6px">Total kopi: <b style="color:#f0d060">${total}</b></div>`;
					for (const [id, c] of Object.entries(COFFEE)) {
						h += `<div class="ir">
        <div><div class="ir-name">${c.emoji} ${c.name}</div><div style="font-size:5px;color:#4a3818;margin-top:2px">🌱 Benih: ${G.seedStock[id] || 0}</div></div>
        <div style="text-align:right"><div class="ir-qty">${G.inventory[id] || 0}</div><div style="font-size:5px;color:#4a3818">~${c.basePrice}rp</div></div>
      </div>`;
					}
					let active = 0;
					for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (plots[r][c].state > PS.EMPTY) active++;
					h += `<div style="margin-top:10px;padding-top:6px;border-top:1px solid #1a1008;font-size:6px;color:#4a3818;line-height:2">
      💰 ${G.gold}rp<br>📅 Hari ${G.day}<br>🌍 ${getSeason().name}<br>🌱 Plot aktif: ${active}
    </div>`;
					el.innerHTML = h;
				}
			}

			// ── HUD ────────────────────────────────────────────────
			function updateHUD() {
				document.getElementById("h-gold").textContent = G.gold;
				const s = G.seedStock[G.selectedSeed] || 0;
				document.getElementById("h-seed-icon").textContent = COFFEE[G.selectedSeed].emoji;
				document.getElementById("h-seed-qty").textContent = s;
				const total = Object.values(G.inventory).reduce((a, b) => a + b, 0);
				document.getElementById("h-inv").textContent = total;
				const p = plots[player.y]?.[player.x];
				const pt = p?.coffeeType ? ` (${COFFEE[p.coffeeType].emoji}${COFFEE[p.coffeeType].name})` : "";
				document.getElementById("plot-txt").textContent = p ? PS_LBL[p.state] + pt : "—";
			}

			function setTool(t) {
				G.tool = t;
				["dig", "sow", "water", "harvest"].forEach((x) => document.getElementById("btn-" + x).classList.toggle("on", x === t));
			}

			function showToast(msg, dur = 2200) {
				const el = document.getElementById("toast");
				el.textContent = msg;
				el.classList.add("show");
				clearTimeout(toastTimer);
				toastTimer = setTimeout(() => el.classList.remove("show"), dur);
			}

			// ── INPUT ──────────────────────────────────────────────
			document.addEventListener("keydown", (e) => {
				keys[e.key] = true;
				if (e.key === "e" || e.key === "E" || e.key === " ") {
					e.preventDefault();
					doAction();
				}
				if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) e.preventDefault();
				if (e.key === "1") setTool("dig");
				if (e.key === "2") setTool("sow");
				if (e.key === "3") setTool("water");
				if (e.key === "4") setTool("harvest");
				if (e.key === "Tab") {
					e.preventDefault();
					togglePanel();
				}
			});
			document.addEventListener("keyup", (e) => (keys[e.key] = false));

			gc.addEventListener("click", (e) => {
				if (player.isActing) return;
				const r = gc.getBoundingClientRect(),
					sx = CW / r.width,
					sy = CH / r.height;
				const tc = Math.floor(((e.clientX - r.left) * sx) / TILE),
					tr = Math.floor(((e.clientY - r.top) * sy) / TILE);
				if (tc >= 0 && tc < COLS && tr >= 0 && tr < ROWS) {
					player.x = tc;
					player.y = tr;
					updateHUD();
					setTimeout(doAction, 50);
				}
			});

			// ── PLAYER MOVEMENT ────────────────────────────────────
			function updatePlayer(dt) {
				if (player.isActing) {
					stepAnim(dt);
					return;
				}
				const now = Date.now();
				if (now - lastMoveT < 140) {
					if (!player.moving) setAnim("idle_down");
					stepAnim(dt);
					return;
				}
				let dx = 0,
					dy = 0;
				if (keys["ArrowUp"] || keys["w"] || keys["W"]) {
					dy = -1;
					player.dir = "up";
				} else if (keys["ArrowDown"] || keys["s"] || keys["S"]) {
					dy = 1;
					player.dir = "down";
				} else if (keys["ArrowLeft"] || keys["a"] || keys["A"]) {
					dx = -1;
					player.dir = "left";
				} else if (keys["ArrowRight"] || keys["d"] || keys["D"]) {
					dx = 1;
					player.dir = "right";
				}

				if (dx || dy) {
					const nx = player.x + dx,
						ny = player.y + dy;
					if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS) {
						player.x = nx;
						player.y = ny;
					}
					player.moving = true;
					lastMoveT = now;
					setAnim("walk_" + player.dir);
					updateHUD();
				} else {
					if (player.moving) {
						setAnim("idle_down");
						player.moving = false;
					}
				}
				stepAnim(dt);
			}

			// ── INTRO ANIMATION ────────────────────────────────────
			(function () {
				const ic = document.getElementById("intro-canvas");
				const ix = ic.getContext("2d");
				ix.imageSmoothingEnabled = false;
				let it = 0;
				function drawIntro() {
					it++;
					ix.fillStyle = "#1a2e0a";
					ix.fillRect(0, 0, 320, 240);
					// Animated title scene
					// Ground
					ix.fillStyle = "#3a6a1a";
					ix.fillRect(0, 140, 320, 100);
					ix.fillStyle = "#2d5512";
					for (let c = 0; c < 8; c++) ix.fillRect(c * 40 + (c % 2) * 20, 140, 40, 100);
					// Soil rows
					ix.fillStyle = "#5a3818";
					ix.fillRect(40, 120, 240, 80);
					// Coffee tree (animated)
					const sway = Math.sin(it / 30) * 3;
					ix.fillStyle = "#7b4226";
					ix.fillRect(155 + sway, 100, 10, 50);
					ix.fillStyle = "#2d6a10";
					ix.fillRect(130 + sway, 70, 60, 35);
					ix.fillRect(135 + sway, 50, 50, 25);
					ix.fillRect(143 + sway, 36, 34, 18);
					// Red berries
					ix.fillStyle = "#d02020";
					[
						[145, 75],
						[160, 65],
						[170, 80],
						[152, 90],
						[168, 72],
					].forEach(([bx, by]) => {
						ix.fillRect(bx + sway - 1, by - 1, 6, 6);
						ix.fillStyle = "#ff4030";
						ix.fillRect(bx + sway, by, 3, 3);
						ix.fillStyle = "#d02020";
					});
					// Stars
					if (it % 20 < 10) {
						ix.fillStyle = "#ffe060";
						[
							[20, 20],
							[280, 40],
							[60, 60],
							[250, 80],
						].forEach(([sx, sy]) => ix.fillRect(sx, sy, 2, 2));
					}
					// Mini character walking
					const charX = ((it * 2) % 400) - 40;
					if (charX > 0 && charX < 320) {
						const cf = Math.floor(it / 8) % 4;
						ix.fillStyle = "#3a7ac8";
						ix.fillRect(charX, 155, 14, 16);
						ix.fillStyle = "#e8b07a";
						ix.fillRect(charX + 2, 143, 10, 14);
						ix.fillStyle = "#8b4513";
						ix.fillRect(charX + 1, 140, 12, 8);
						ix.fillStyle = "#7a4a20";
						ix.fillRect(charX + 2, 171, 4, cf % 2 === 0 ? 10 : 12);
						ix.fillRect(charX + 8, 171, 4, cf % 2 === 0 ? 12 : 10);
					}
					requestAnimationFrame(drawIntro);
				}
				drawIntro();
			})();

			// ── MAIN LOOP ──────────────────────────────────────────
			let lastT = 0;
			function gameLoop(ts) {
				const dt = ts - lastT;
				lastT = ts;
				updateGrowth();
				updatePlayer(dt);
				updateParticles();
				updateDayBar();

				ctx.clearRect(0, 0, CW, CH);

				// Weather overlay effect
				if (G.weather.id === "hujan" || G.weather.id === "gerimis") {
					ctx.fillStyle = "rgba(30,60,120,0.06)";
					ctx.fillRect(0, 0, CW, CH);
					// Rain streaks
					ctx.strokeStyle = "rgba(80,140,220,0.15)";
					ctx.lineWidth = 1;
					const rs = Math.floor(ts / 20) % 20;
					for (let i = 0; i < 25; i++) {
						const rx = (i * 61 + rs * 7) % CW;
						const ry = (i * 37 + rs * 11) % CH;
						ctx.beginPath();
						ctx.moveTo(rx, ry);
						ctx.lineTo(rx - 2, ry + 8);
						ctx.stroke();
					}
				} else if (G.weather.id === "panas") {
					ctx.fillStyle = "rgba(120,60,0,0.05)";
					ctx.fillRect(0, 0, CW, CH);
				}

				for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) drawTile(c, r);
				drawParticles();

				const px = player.x * TILE + TILE / 2;
				const py = player.y * TILE + TILE / 2;
				drawCharacter(px, py);

				requestAnimationFrame(gameLoop);
			}

			function resetGame() {
				G = { gold: 500, day: 1, seasonIdx: 0, weather: { id: "cerah", name: "Cerah", icon: "🌤" }, selectedSeed: "arabika", inventory: { arabika: 0, robusta: 0, liberika: 0 }, seedStock: { arabika: 5, robusta: 5, liberika: 0 }, tool: "dig" };
				player = { x: 6, y: 4, dir: "down", anim: "idle_down", frame: 0, frameTimer: 0, isActing: false, moving: false };
				particles = [];
				dayT = Date.now();
				initPlots();
				setTool("dig");
				updateWeatherUI();
				updateHUD();
				refreshPanel();
				showToast("🔄 Reset!");
			}

			function startGame() {
				document.getElementById("intro").style.display = "none";
				showToast("Selamat datang! TAB=Panel · 1234=Tool · E=Aksi · Klik tile", 3500);
			}

			// ── INIT ───────────────────────────────────────────────
			initPlots();
			updateWeatherUI();
			updateHUD();
			refreshPanel();
			requestAnimationFrame(gameLoop);
		</script>
	</body>
</html>
